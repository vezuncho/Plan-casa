<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Actualizar CasaPlan</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0f172a;color:#f8fafc;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:24px;box-sizing:border-box}.box{width:min(460px,100%);background:#1e293b;border:1px solid #334155;border-radius:22px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.35)}h1{margin:0 0 10px;font-size:25px}p{color:#cbd5e1;line-height:1.5}.status{margin:18px 0;padding:13px;border-radius:14px;background:#0f172a;color:#e2e8f0}.btn{width:100%;border:0;border-radius:14px;padding:14px 16px;font-weight:800;font-size:16px;background:#f97316;color:white;cursor:pointer}.btn:disabled{opacity:.55}.small{font-size:13px;color:#94a3b8;margin-top:12px}</style>
</head>
<body><main class="box"><h1>Actualizar CasaPlan</h1><p>Esta página elimina la versión antigua almacenada y abre la versión publicada más reciente.</p><div id="status" class="status">Preparado para limpiar la aplicación.</div><button id="go" class="btn">Limpiar y abrir CasaPlan</button><div class="small">No borra las tareas ni los datos de Supabase.</div></main>
<script>
const statusEl=document.getElementById('status'),btn=document.getElementById('go');
async function reset(){btn.disabled=true;statusEl.textContent='Eliminando caché y actualización anterior…';try{
 if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}
 if('caches' in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}
 ['casaplan_installed_version','casaplan_last_update','casaplan_update_dismissed','app_version'].forEach(k=>localStorage.removeItem(k));
 sessionStorage.clear();statusEl.textContent='Limpieza completada. Abriendo v53…';
 const u=new URL('/',location.origin);u.searchParams.set('v','53');u.searchParams.set('build',Date.now().toString());location.replace(u.toString());
 }catch(e){statusEl.textContent='No se pudo limpiar automáticamente. Cierra CasaPlan, vuelve a abrir esta página y prueba de nuevo.';btn.disabled=false;}}
btn.addEventListener('click',reset);
</script></body></html>
