<script>
const APP_VERSION=24;
const APP_VERSION_LABEL='v24 filtros compactos';
async function clearOldAppCache(){
  try{if('caches' in window){let names=await caches.keys();await Promise.all(names.map(n=>caches.delete(n)));}}catch(e){}
  try{if('serviceWorker' in navigator){let regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}}catch(e){}
}
async function forceAppUpdate(){
  await clearOldAppCache();
  const clean=location.origin+location.pathname+'?v='+APP_VERSION+'&t='+Date.now();
  location.replace(clean);
}
function showUpdateBanner(remoteVersion){
  if(document.getElementById('updateBanner'))return;
  const d=document.createElement('div');
  d.id='updateBanner';
  d.className='updateBanner';
  d.innerHTML=`<div><b>Nueva versión disponible</b><span>Instalada v${APP_VERSION}. Publicada v${remoteVersion}. Actualiza para evitar caché vieja.</span></div><button class="btn" onclick="forceAppUpdate()">Actualizar</button>`;
  document.body.appendChild(d);
}
async function checkAppVersion(){
  try{
    const r=await fetch('version.json?ts='+Date.now(),{cache:'no-store'});
    if(!r.ok)return;
    const v=await r.json();
    const remote=parseInt(v.version||0,10);
    if(remote>APP_VERSION)showUpdateBanner(remote);
  }catch(e){}
}
window.addEventListener('load',()=>setTimeout(checkAppVersion,1200));

const CONFIG={SUPABASE_URL:'https://xyjrbgntqcydweheolyl.supabase.co',SUPABASE_ANON_KEY:'sb_publishable_MipZ8ou0CKpHsniT-ZIltw_l9UBAqze',FAMILY_CODE:localStorage.getItem('casaplan_family_code')||'familia-vezuncho',PHOTO_BUCKET:'task-photos'};
const sb=window.supabase?.createClient(CONFIG.SUPABASE_URL,CONFIG.SUPABASE_ANON_KEY);
let state={family:null,members:[],tasks:[],taskAssignments:[],shopping:[],rooms:[],tab:'hoy',error:'',photoError:'',weekOffset:0,monthOffset:0,selectedDate:null,filter:'all',quickFilter:'today',roomFilter:'all',photoCache:{},adminOpen:false};
const $=s=>document.querySelector(s); const $$=s=>[...document.querySelectorAll(s)];
const esc=s=>String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const iso=d=>{let x=new Date(d);x.setMinutes(x.getMinutes()-x.getTimezoneOffset());return x.toISOString().slice(0,10)}; const today=()=>iso(new Date());
const addDays=(d,n)=>{let x=new Date(d+'T00:00:00');x.setDate(x.getDate()+n);return iso(x)};
const startWeek=(offset=0)=>{let d=new Date();let day=(d.getDay()+6)%7;d.setDate(d.getDate()-day+offset*7);return iso(d)};
const firstMonth=(offset=0)=>{let d=new Date();d.setDate(1);d.setMonth(d.getMonth()+offset);return iso(d)};
const monthTitle=d=>new Date(d+'T00:00:00').toLocaleDateString('es-ES',{month:'long',year:'numeric'});
const selectedDate=()=>state.selectedDate||today();
const nice=d=>new Date(d+'T00:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
const short=d=>new Date(d+'T00:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric'});
const member=id=>state.members.find(m=>m.id===id); const available=()=>state.members.filter(m=>!m.away);
function taskAssignments(taskId){return state.taskAssignments.filter(a=>a.task_id===taskId)}
function assignedMembers(t){let as=taskAssignments(t.id); if(as.length)return as.map(a=>member(a.member_id)).filter(Boolean); let m=member(t.member_id); return m?[m]:[]}
function assignedLabel(t){let ms=assignedMembers(t);return ms.length?ms.map(m=>m.name).join(', '):'Sin asignar'}
function taskStart(t){return t.start_date||t.due_date}
function taskEnd(t){return t.end_date||t.due_date}
function taskIsLate(t){return t.status!=='done'&&taskEnd(t)<today()}
function dateDiffDays(a,b){return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000)}
function taskMatchesDate(t,date){let st=taskStart(t), en=taskEnd(t);if(!st)st=today();if(!en)en=st;if(t.repeat&&t.repeat!=='none'){if(date<st)return false;if(en&&date>en)return false;let diff=dateDiffDays(st,date);if(t.repeat==='daily')return true;if(t.repeat==='weekly')return diff%7===0;if(t.repeat==='biweekly')return diff%14===0;if(t.repeat==='monthly'){let a=new Date(st+'T00:00:00'),b=new Date(date+'T00:00:00');return a.getDate()===b.getDate()}return date>=st&&date<=en}return date>=st&&date<=en}
function taskDateLine(t){let st=taskStart(t),en=taskEnd(t);let range=st===en?nice(en):`${nice(st)} → ${nice(en)}`;return `${range} · ${labelRepeat(t.repeat)}`}
function statusLabel(t){return t.status==='done'?'Hecha':(t.status==='in_progress'?'En curso':'Pendiente')}
function memberCheckboxes(selected=[]){return state.members.map(m=>`<label class="pill" style="justify-content:flex-start"><input type="checkbox" name="member_ids" value="${m.id}" ${selected.includes(m.id)?'checked':''} style="width:auto;margin-right:6px">${esc(m.name)}${m.away?' (ausente)':''}</label>`).join('')}
const defaultRooms=[{id:'cocina',name:'Cocina',icon:'🍳'},{id:'bano',name:'Baño',icon:'🚿'},{id:'salon',name:'Salón',icon:'🛋️'},{id:'dormitorio',name:'Dormitorio',icon:'🛏️'},{id:'garaje',name:'Garaje',icon:'🧰'},{id:'exterior',name:'Exterior',icon:'🌿'}];
function rooms(){let source=state.rooms&&state.rooms.length?state.rooms:defaultRooms;let map=new Map(source.map(r=>[r.id,{id:r.id,name:r.name,icon:r.icon||'🏠',is_default:!!r.is_default}]));return [...map.values()]}
function room(id){return rooms().find(r=>r.id===id)}
function slugRoom(name){return String(name||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,32)||('habitacion-'+Date.now())}
function taskRoomId(t){let m=String(t.description||'').match(/(?:^|\n)\[ROOM:([^\]]+)\]/);return m?m[1]:'sin-zona'}
function taskNeedsPhoto(t){return /(?:^|\n)\[PHOTO_REQUIRED:1\]/.test(String(t.description||''))}
function cleanDesc(t){return String(t.description||'').replace(/(?:^|\n)\[ROOM:[^\]]+\]/g,'').replace(/(?:^|\n)\[PHOTO_REQUIRED:1\]/g,'').trim()}
function packDesc(roomId,desc,photoRequired=false){let meta=[];if(roomId&&roomId!=='sin-zona')meta.push(`[ROOM:${roomId}]`);if(photoRequired)meta.push('[PHOTO_REQUIRED:1]');let body=String(desc||'').trim();return meta.concat(body?[body]:[]).join('\n').trim()}
function roomOptions(sel=''){return `<option value="sin-zona" ${sel==='sin-zona'?'selected':''}>Sin habitación</option>`+rooms().map(r=>`<option value="${esc(r.id)}" ${sel===r.id?'selected':''}>${esc(r.icon)} ${esc(r.name)}</option>`).join('')}
function roomStats(id){let ts=state.tasks.filter(t=>taskRoomId(t)===id), pending=ts.filter(t=>t.status!=='done').length, late=ts.filter(t=>taskIsLate(t)).length;return {total:ts.length,pending,late,done:ts.length-pending}}
async function setTaskRoom(id,roomId){let t=state.tasks.find(x=>x.id===id);if(!t)return;await sb.from('tasks').update({description:packDesc(roomId,cleanDesc(t),taskNeedsPhoto(t))}).eq('id',id)}
async function addRoom(ev){ev.preventDefault();let f=new FormData(ev.target),name=f.get('name').trim(),icon=f.get('icon').trim()||'🏠';if(!name)return;let id=slugRoom(name);if(rooms().some(r=>r.id===id))id+='-'+Date.now().toString().slice(-4);let r=await sb.from('rooms').insert({family_id:state.family.id,id,name,icon,is_default:false});if(r.error)alert(r.error.message);else ev.target.reset()}
async function delRoom(id){let r=room(id);if(!r||r.is_default)return alert('Las habitaciones base no se eliminan. Puedes dejarla sin usar.');if(roomStats(id).total)return alert('Antes mueve o elimina las tareas de esta habitación.');let res=await sb.from('rooms').delete().eq('family_id',state.family.id).eq('id',id);if(res.error)alert(res.error.message)}
function pickRoom(id){state.roomFilter=id;openTab('habitaciones');renderHabitaciones()}

function photoKey(taskId){return `casaplan_task_photos_${CONFIG.FAMILY_CODE}_${taskId}`}
function localPhotos(taskId){try{return JSON.parse(localStorage.getItem(photoKey(taskId))||'[]')}catch{return []}}
function saveLocalPhotos(taskId,photos){localStorage.setItem(photoKey(taskId),JSON.stringify(photos.slice(0,8)))}
function getTaskPhotos(taskId){return state.photoCache[taskId]||localPhotos(taskId)||[]}
function photoPath(taskId,fileName=''){return `${CONFIG.FAMILY_CODE}/${taskId}/${fileName}`.replace(/\\/g,'/')}
function resizeBlob(file,max=1280,quality=.78){return new Promise((resolve,reject)=>{let img=new Image();let fr=new FileReader();fr.onload=()=>{img.onload=()=>{let scale=Math.min(1,max/Math.max(img.width,img.height));let c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);c.getContext('2d').drawImage(img,0,0,c.width,c.height);c.toBlob(b=>b?resolve(b):reject(new Error('No se pudo comprimir la foto')),'image/jpeg',quality)};img.onerror=reject;img.src=fr.result};fr.onerror=reject;fr.readAsDataURL(file)})}
function resizeImage(file){return new Promise((resolve,reject)=>{let reader=new FileReader();reader.onerror=()=>reject(new Error('No se pudo leer la imagen'));reader.onload=()=>{let img=new Image();img.onerror=()=>reject(new Error('No se pudo cargar la imagen'));img.onload=()=>{let max=1200,scale=Math.min(1,max/Math.max(img.width,img.height));let canvas=document.createElement('canvas');canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);let ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);resolve(canvas.toDataURL('image/jpeg',0.74))};img.src=reader.result};reader.readAsDataURL(file)})}
async function refreshTaskPhotos(taskId){let local=localPhotos(taskId);try{let {data,error}=await sb.storage.from(CONFIG.PHOTO_BUCKET).list(photoPath(taskId),{limit:100,sortBy:{column:'created_at',order:'asc'}});if(error)throw error;let cloud=(data||[]).filter(x=>x.name&&!x.name.endsWith('/')).map(x=>{let path=photoPath(taskId,x.name);let pub=sb.storage.from(CONFIG.PHOTO_BUCKET).getPublicUrl(path);return {id:x.name,src:pub.data.publicUrl,created_at:x.created_at||x.updated_at||'',cloud:true,path}});state.photoCache[taskId]=cloud.concat(local.filter(lp=>!cloud.some(cp=>cp.id===lp.id))).slice(0,8);state.photoError=''}catch(err){state.photoCache[taskId]=local;state.photoError='Fotos en modo local: falta configurar Supabase Storage o permisos del bucket task-photos.'}}
async function refreshAllPhotos(){await Promise.all((state.tasks||[]).map(t=>refreshTaskPhotos(t.id)))}
async function addTaskPhoto(ev,taskId){let files=[...ev.target.files];if(!files.length)return;let photos=getTaskPhotos(taskId);try{for(const file of files){if(!file.type.startsWith('image/'))continue;if(photos.length>=8){alert('Máximo 8 fotos por tarea en esta versión.');break}let id=`${Date.now()}-${Math.random().toString(16).slice(2)}.jpg`;let uploaded=false;try{let blob=await resizeBlob(file);let up=await sb.storage.from(CONFIG.PHOTO_BUCKET).upload(photoPath(taskId,id),blob,{contentType:'image/jpeg',upsert:false});if(up.error)throw up.error;uploaded=true}catch(cloudErr){let local=localPhotos(taskId);local.push({id,src:await resizeImage(file),created_at:new Date().toISOString(),cloud:false});saveLocalPhotos(taskId,local);state.photoError='No se pudo subir a Supabase Storage. La foto quedó solo en este dispositivo.'}photos=uploaded?photos.concat([{id,cloud:true}]):localPhotos(taskId)}await refreshTaskPhotos(taskId);render()}catch(err){alert(err.message||'No se pudo guardar la foto.')}finally{ev.target.value=''}}
async function delTaskPhoto(taskId,photoId){let p=getTaskPhotos(taskId).find(x=>x.id===photoId);if(p?.cloud&&p.path){await sb.storage.from(CONFIG.PHOTO_BUCKET).remove([p.path])}else{saveLocalPhotos(taskId,localPhotos(taskId).filter(x=>x.id!==photoId))}await refreshTaskPhotos(taskId);render()}
function openPhoto(src){let d=document.createElement('div');d.className='photoModal';d.innerHTML=`<button class="closePhoto" onclick="this.parentElement.remove()">×</button><img src="${src}" alt="Foto de tarea">`;d.onclick=e=>{if(e.target===d)d.remove()};document.body.appendChild(d)}
function photoBlock(taskId){let photos=getTaskPhotos(taskId);let cloudCount=photos.filter(p=>p.cloud).length;let label=state.photoError&&cloudCount===0?`${photos.length}/8 fotos locales`:`${photos.length}/8 fotos sincronizadas`;return `<div class="photoActions"><label class="fileBtn">Añadir foto<input type="file" accept="image/*" capture="environment" multiple onchange="addTaskPhoto(event,'${taskId}')"></label><span class="muted small">${label}</span></div>${photos.length?`<div class="photoGrid">${photos.map(p=>`<div class="photoThumb"><img src="${p.src}" onclick="openPhoto(this.src)" alt="Foto"><button onclick="delTaskPhoto('${taskId}','${p.id}')">×</button></div>`).join('')}</div>`:''}`}

function renderCalendario(){
  let sel=selectedDate();
  let weekStart=startWeek(state.weekOffset);
  let weekDays=[0,1,2,3,4,5,6].map(n=>addDays(weekStart,n));
  let mStart=firstMonth(state.monthOffset);
  let first=new Date(mStart+'T00:00:00');
  let month=first.getMonth();
  let monthGridStart=addDays(mStart,-((first.getDay()+6)%7));
  let monthDays=Array.from({length:42},(_,i)=>addDays(monthGridStart,i));
  let selectedTasks=tasksOnDate(sel);
  let weekTasks=state.tasks.filter(t=>weekDays.some(d=>taskMatchesDate(t,d))); 
  const dots=(date)=>{let ts=tasksOnDate(date);let p=ts.filter(t=>t.status!=='done').length;let d=ts.length-p;return `<div class="dayDots">${p?`<span class="taskDot pendingDot"></span>`:''}${d?`<span class="taskDot doneDot"></span>`:''}${ts.length?`<small>${ts.length}</small>`:''}</div>`};
  $('#view-calendario').innerHTML=`
    <div class="card">
      <div class="between wrap">
        <button class="btn ghost" onclick="state.weekOffset--;renderCalendario()">Anterior</button>
        <div style="text-align:center">
          <h2>Semana</h2>
          <div class="muted small">Desde ${short(weekStart)} hasta ${short(addDays(weekStart,6))}</div>
        </div>
        <button class="btn ghost" onclick="state.weekOffset++;renderCalendario()">Siguiente</button>
      </div>
      <button class="btn secondary full" style="margin-top:12px" onclick="goToday()">Volver a hoy</button>
      <div class="calendar weekCalendar" style="margin-top:14px">
        ${weekDays.map(d=>{let ts=tasksOnDate(d);return `<button type="button" class="day dayBtn ${d===today()?'today':''} ${d===sel?'selected':''}" onclick="selectDay('${d}')"><div class="dayName">${short(d).split(' ')[0]}</div><div class="dayNum">${new Date(d+'T00:00:00').getDate()}</div>${dots(d)}${ts.slice(0,2).map(t=>`<div class="miniTask ${t.status==='done'?'done':''}">${esc(t.title)}</div>`).join('')}${ts.length>2?`<div class="tiny muted">+${ts.length-2} más</div>`:''}</button>`}).join('')}
      </div>
    </div>
    <div class="card">
      <div class="between wrap">
        <button class="btn ghost" onclick="state.monthOffset--;renderCalendario()">Mes anterior</button>
        <div style="text-align:center"><h2>Vista mensual</h2><div class="muted small">${monthTitle(mStart)}</div></div>
        <button class="btn ghost" onclick="state.monthOffset++;renderCalendario()">Mes siguiente</button>
      </div>
      <div class="monthNames"><span>L</span><span>M</span><span>X</span><span>J</span><span>V</span><span>S</span><span>D</span></div>
      <div class="monthCalendar">
        ${monthDays.map(d=>{let current=new Date(d+'T00:00:00').getMonth()===month;return `<button type="button" class="monthDay ${current?'':'otherMonth'} ${d===today()?'today':''} ${d===sel?'selected':''}" onclick="selectDay('${d}')"><b>${new Date(d+'T00:00:00').getDate()}</b>${dots(d)}</button>`}).join('')}
      </div>
    </div>
    <div class="card">
      <div class="between wrap"><div><h2>${nice(sel)}</h2><div class="muted small">${selectedTasks.length} tarea(s) en este día</div></div><button class="btn secondary" onclick="openTab('tareas')">Crear tarea aquí</button></div>
      ${selectedTasks.length?selectedTasks.map(taskCard).join(''):'<div class="empty">No hay tareas en el día seleccionado.</div>'}
    </div>
    <div class="card"><h2>Tareas de la semana</h2>${weekTasks.length?weekTasks.map(taskCard).join(''):'<div class="empty">Semana sin tareas</div>'}</div>`
}function renderTareas(){let list=state.tasks.filter(t=>state.filter==='all'||(state.filter==='pending'?t.status!=='done':t.status==='done'));$('#view-tareas').innerHTML=`<div class="card"><div class="between wrap"><h2>Nueva tarea</h2><button type="button" class="btn secondary" onclick="openTab('habitaciones')">Habitaciones</button></div><form onsubmit="addTask(event)" class="grid"><input name="title" placeholder="Ej. Limpiar cocina" required><textarea name="description" placeholder="Notas opcionales"></textarea><div><div class="muted small" style="margin-bottom:6px">Asignar a una o varias personas</div><div class="row wrap">${memberCheckboxes()}</div></div><select name="room_id">${roomOptions(state.roomFilter==='all'?'sin-zona':state.roomFilter)}</select><label class="item small" style="margin:0"><input type="checkbox" name="photo_required" style="width:auto;margin-right:8px"> Bloquear finalización hasta añadir reporte fotográfico <span class="muted">(no se podrá cambiar después)</span></label><div class="grid grid2"><label class="small muted">Fecha de inicio<input name="start_date" type="date" value="${selectedDate()}" required></label><label class="small muted">Fecha límite<input name="end_date" type="date" value="${selectedDate()}" required></label></div><select name="repeat"><option value="none">Sin repetir</option><option value="daily">Diaria</option><option value="weekly">Semanal</option><option value="biweekly">Quincenal</option><option value="monthly">Mensual</option></select><div class="muted small">Para una tarea de varios días, pon una fecha de inicio y una fecha límite. Aparecerá en el calendario durante todo ese periodo.</div><div class="grid grid2"><input name="points" type="number" min="1" max="20" value="1"><button class="btn full">Guardar tarea</button></div></form></div><div class="card"><div class="between wrap"><h2>Tareas</h2><div class="row"><button class="btn ghost" onclick="state.filter='all';render()">Todas</button><button class="btn ghost" onclick="state.filter='pending';render()">Pendientes</button><button class="btn ghost" onclick="state.filter='done';render()">Hechas</button></div></div><button class="btn secondary full" onclick="smartDistribute()">Repartir tareas sin asignar</button>${list.length?list.map(taskCard).join(''):'<div class="empty">No hay tareas en este filtro</div>'}</div>`}
function renderHabitaciones(){let rs=rooms(),active=state.roomFilter||'all';let list=state.tasks.filter(t=>active==='all'||taskRoomId(t)===active).sort((a,b)=>(a.status==='done')-(b.status==='done')||String(taskEnd(a)).localeCompare(String(taskEnd(b))));$('#view-habitaciones').innerHTML=`<div class="card"><div class="between wrap"><div><h2>Habitaciones</h2><div class="muted small">Organiza las tareas por zonas de la casa.</div></div><button class="btn secondary" onclick="openTab('tareas')">Nueva tarea</button></div><div class="roomGrid" style="margin-top:14px"><button class="roomCard ${active==='all'?'active':''}" onclick="state.roomFilter='all';renderHabitaciones()"><div class="roomIcon">🏠</div><h3>Toda la casa</h3><div class="roomMeta"><span class="roomTag">${state.tasks.length} tareas</span><span class="roomTag bad">${state.tasks.filter(t=>t.status!=='done').length} pendientes</span></div></button>${rs.map(r=>{let st=roomStats(r.id);return `<button class="roomCard ${active===r.id?'active':''}" onclick="state.roomFilter='${esc(r.id)}';renderHabitaciones()"><div class="roomIcon">${esc(r.icon)}</div><h3>${esc(r.name)}</h3><div class="roomMeta"><span class="roomTag">${st.total} tareas</span><span class="roomTag ${st.pending?'bad':'ok'}">${st.pending} pendientes</span>${st.late?`<span class="roomTag bad">${st.late} atrasadas</span>`:''}</div></button>`}).join('')}</div></div><div class="card"><h2>${active==='all'?'Tareas de toda la casa':esc(room(active)?.name||'Sin habitación')}</h2><div class="roomFilter"><button class="btn ${active==='all'?'secondary':'ghost'}" onclick="state.roomFilter='all';renderHabitaciones()">Todas</button>${rs.map(r=>`<button class="btn ${active===r.id?'secondary':'ghost'}" onclick="state.roomFilter='${esc(r.id)}';renderHabitaciones()">${esc(r.icon)} ${esc(r.name)}</button>`).join('')}</div>${list.length?list.map(taskCard).join(''):'<div class="empty">No hay tareas en esta habitación.</div>'}</div><div class="card"><h2>Añadir habitación</h2><form onsubmit="addRoom(event)" class="grid grid3"><input name="icon" placeholder="Icono" value="🏠"><input name="name" placeholder="Ej. Despensa" required><button class="btn">Añadir</button></form><p class="muted small">Las habitaciones nuevas se sincronizan con Supabase para todos los dispositivos.</p></div>`}
function renderFamilia(){let rank=ranking();$('#view-familia').innerHTML=`<div class="card"><h2>Miembros</h2>${state.members.map(m=>`<div class="item"><div class="memberLine"><div class="avatar" style="background:${m.color}">${esc(m.name[0]?.toUpperCase()||'?')}</div><input value="${esc(m.name)}" onchange="renameMember('${m.id}',this.value)"><input type="color" value="${m.color}" onchange="colorMember('${m.id}',this.value)" style="width:58px;padding:7px"></div><div class="between wrap" style="margin-top:10px"><label class="small"><input type="checkbox" ${m.away?'checked':''} onchange="toggleAway('${m.id}',this.checked)"> Ausente / vacaciones</label><button class="btn danger" onclick="delMember('${m.id}')">Eliminar</button></div></div>`).join('')||'<div class="empty">Sin miembros</div>'}</div><div class="card"><h2>Añadir miembro</h2><form onsubmit="addMember(event)" class="grid"><input name="name" placeholder="Nombre" required><input name="color" type="color" value="#2563eb"><button class="btn">Añadir</button></form></div><div class="card"><h2>Carga semanal</h2>${rank.map(m=>`<div class="item between"><span>${esc(m.name)}</span><b>${m.points} puntos</b></div>`).join('')}</div>`}
function renderCompra(){let pending=state.shopping.filter(i=>!i.bought), bought=state.shopping.filter(i=>i.bought);$('#view-compra').innerHTML=`<div class="card"><h2>Lista de la compra</h2><form onsubmit="addShop(event)" class="row"><input name="title" placeholder="Añadir producto" required><button class="btn">Añadir</button></form></div><div class="card"><h2>Pendiente</h2>${pending.length?pending.map(shopCard).join(''):'<div class="empty">No queda nada pendiente</div>'}</div><div class="card"><h2>Comprado</h2>${bought.length?bought.map(shopCard).join(''):'<div class="empty">Todavía no hay productos comprados</div>'}</div>`}
function shopCard(i){return `<div class="item between"><label><input type="checkbox" ${i.bought?'checked':''} onchange="toggleShop('${i.id}',this.checked)"> <span class="${i.bought?'done':''}">${esc(i.title)}</span></label><button class="btn danger" onclick="delShop('${i.id}')">Eliminar</button></div>`}
async function enableNotifications(){if(!('Notification'in window))return alert('Este navegador no soporta notificaciones.');let p=await Notification.requestPermission();localStorage.setItem('casaplan_notifications',p==='granted'?'1':'0');render()}
function exportData(){let data={members:state.members,tasks:state.tasks,taskAssignments:state.taskAssignments,shopping:state.shopping,rooms:state.rooms,exported_at:new Date().toISOString()};let blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='casaplan-copia.json';a.click()}
function changeFamilyCode(){let code=prompt('Código familiar',CONFIG.FAMILY_CODE);if(code&&code.trim()){localStorage.setItem('casaplan_family_code',code.trim());alert('Código guardado. Recarga la página para entrar en esa familia.')}}

function adminTaskEditor(){let rows=state.tasks.slice().sort((a,b)=>String(b.created_at).localeCompare(String(a.created_at))).map(t=>{let ids=taskAssignments(t.id).map(a=>a.member_id);if(!ids.length&&t.member_id)ids=[t.member_id];return `<div class="item"><input value="${esc(t.title)}" onchange="updateTaskField('${t.id}','title',this.value)"><div class="grid grid2" style="margin-top:8px"><input type="date" value="${taskStart(t)}" onchange="updateTaskField('${t.id}','start_date',this.value)"><input type="date" value="${taskEnd(t)}" onchange="updateTaskField('${t.id}','end_date',this.value);updateTaskField('${t.id}','due_date',this.value)"><select onchange="setTaskRoom('${t.id}',this.value)">${roomOptions(taskRoomId(t))}</select></div><div class="muted small" style="margin-top:10px">Asignados</div><div class="row wrap">${state.members.map(m=>`<label class="pill"><input type="checkbox" data-assign-task="${t.id}" value="${m.id}" ${ids.includes(m.id)?'checked':''} onchange="updateTaskAssignments('${t.id}',this)" style="width:auto;margin-right:6px">${esc(m.name)}</label>`).join('')}</div><div class="row wrap" style="margin-top:10px"><button class="btn danger" onclick="delTask('${t.id}')">Eliminar tarea</button></div></div>`}).join('');return `<div class="item"><button class="btn ghost full" onclick="state.adminOpen=!state.adminOpen;renderAjustes()">Edición avanzada de tareas</button>${state.adminOpen?`<div class="error small" style="margin-top:10px">Zona de edición. Mejor no tocar salvo que quieras corregir tareas.</div>${rows||'<div class="empty">No hay tareas</div>'}`:''}</div>`}

function renderAjustes(){let notif=localStorage.getItem('casaplan_notifications')==='1';$('#view-ajustes').innerHTML=`<div class="card"><h2>Ajustes</h2><div class="success"><b>Estado:</b> ${state.error?'Error':'Sincronizado'}<br><b>Código familiar:</b> ${esc(CONFIG.FAMILY_CODE)}<br><b>Fotos:</b> ${state.photoError?'Modo local':'Sincronización Supabase Storage'}<br><b>SQL necesario:</b> sin cambios de base en v23<br><b>Enlace:</b> usa la URL de Cloudflare Pages para invitar a la familia.</div>${state.error?`<div class="error">${esc(state.error)}<br><br>Solución: abre Supabase → SQL Editor → pega todo el archivo supabase_sql_completo_v21.sql → Run → espera 10 segundos → recarga esta app.</div>`:''}${state.photoError?`<div class="error">${esc(state.photoError)}
Crea un bucket público llamado task-photos y permite select/insert/delete para usuarios anon.</div>`:''}<div class="item"><h3>Invitar familiares</h3><p class="muted small">Comparte el enlace de Cloudflare Pages. Todos los que usen este mismo código familiar verán los mismos datos.</p><button class="btn secondary" onclick="navigator.clipboard?.writeText(location.href);alert('Enlace copiado')">Copiar enlace</button> <button class="btn ghost" onclick="changeFamilyCode()">Cambiar código</button></div>${adminTaskEditor()}<div class="item"><h3>Notificaciones</h3><p class="muted small">Aviso local del navegador. En iPhone puede requerir instalar la web en pantalla de inicio.</p><button class="btn ${notif?'ok':'secondary'}" onclick="enableNotifications()">${notif?'Notificaciones activadas':'Activar notificaciones'}</button></div><div class="item"><h3>Actualización de la app</h3><p class="muted small">Úsalo si un móvil sigue viendo una versión antigua después de actualizar GitHub/Cloudflare.</p><div class="row wrap"><span class="versionBadge">v23</span><button class="btn secondary" onclick="forceAppUpdate()">Forzar actualización</button></div></div><div class="item"><h3>Limpieza de tareas realizadas</h3><p class="muted small">Cada mes se borran automáticamente las tareas realizadas del mes anterior. No toca las pendientes ni las del mes actual.</p><button class="btn ghost" onclick="cleanupDoneTasksPreviousMonth(true)">Limpiar mes anterior ahora</button></div><div class="item"><h3>Copia</h3><button class="btn ghost" onclick="exportData()">Exportar copia JSON</button></div></div>`}
function render(){stats();renderHoy();renderCalendario();renderTareas();renderHabitaciones();renderFamilia();renderCompra();renderAjustes()}
function openTab(tab){state.tab=tab;$$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));$$('.view').forEach(v=>v.classList.add('hidden'));$('#view-'+tab).classList.remove('hidden');scrollTo(0,0)}
function bindQuickFilterButtons(){ $$('.heroBtn[data-quick-filter]').forEach(btn=>{btn.addEventListener('click',ev=>{ev.preventDefault();openQuickFilter(btn.dataset.quickFilter)})}) }
$$('.nav button').forEach(b=>b.onclick=()=>openTab(b.dataset.tab));bindQuickFilterButtons();init();
setInterval(()=>{if(localStorage.getItem('casaplan_notifications')==='1'&&Notification.permission==='granted'){let n=state.tasks.filter(t=>taskMatchesDate(t,today())&&t.status!=='done').length;if(n&&!sessionStorage.getItem('casaplan_notified_'+today())){new Notification('CasaPlan',{body:`Tienes ${n} tarea(s) pendiente(s) hoy.`});sessionStorage.setItem('casaplan_notified_'+today(),'1')} }},60000);
</script>
</body>
</html>
