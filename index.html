<script>
const APP_VERSION=67;
const APP_VERSION_LABEL='v67 interacción estable';
const BUILD_ID='2026-07-11-v67';
let LATEST_REMOTE_VERSION=APP_VERSION;
async function getRemoteVersion(){
  try{
    const r=await fetch('/version.json?ts='+Date.now(),{cache:'no-store',headers:{'Cache-Control':'no-cache','Pragma':'no-cache'}});
    if(!r.ok)return {version:APP_VERSION,label:APP_VERSION_LABEL,build:BUILD_ID};
    const v=await r.json();
    return {version:parseInt(v.version||APP_VERSION,10),label:v.label||'',build:v.build||''};
  }catch(e){return {version:APP_VERSION,label:APP_VERSION_LABEL,build:BUILD_ID};}
}
async function clearOldAppCache(){
  const results=[];
  try{
    if('caches' in window){
      const names=await caches.keys();
      await Promise.all(names.map(n=>caches.delete(n)));
      results.push(`cachés borradas: ${names.length}`);
    }
  }catch(e){results.push('caché no borrada: '+(e.message||e));}
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(async r=>{try{await r.update()}catch(e){} try{return await r.unregister()}catch(e){return false}}));
      results.push(`service workers eliminados: ${regs.length}`);
    }
  }catch(e){results.push('service worker no eliminado: '+(e.message||e));}
  try{
    localStorage.setItem('casaplan_installed_version',String(APP_VERSION));
    localStorage.setItem('casaplan_installed_build',BUILD_ID);
    localStorage.setItem('casaplan_last_update_cleanup',new Date().toISOString());
  }catch(e){}
  return results;
}
function removeUpdateBanner(){const b=document.getElementById('updateBanner'); if(b)b.remove();}
async function forceAppUpdate(btn){
  const button=btn||document.querySelector('#updateBanner button');
  if(button){button.disabled=true;button.textContent='Actualizando...';}
  const remote=await getRemoteVersion();
  LATEST_REMOTE_VERSION=Math.max(remote.version||APP_VERSION,APP_VERSION);
  await clearOldAppCache();
  try{localStorage.setItem('casaplan_last_seen_version',String(LATEST_REMOTE_VERSION));}catch(e){}
  const url=new URL(location.origin+location.pathname);
  url.searchParams.set('v',String(LATEST_REMOTE_VERSION));
  url.searchParams.set('build',remote.build||String(Date.now()));
  url.searchParams.set('refresh',String(Date.now()));
  location.replace(url.toString());
}
function showUpdateBanner(remoteVersion){
  if(remoteVersion<=APP_VERSION){removeUpdateBanner();return;}
  if(document.getElementById('updateBanner'))return;
  const d=document.createElement('div');
  d.id='updateBanner';
  d.className='updateBanner';
  d.innerHTML=`<div><b>Nueva versión disponible</b><span>Instalada v${APP_VERSION}. Publicada v${remoteVersion}. Se limpiará la caché antes de recargar.</span></div><button class="btn" onclick="forceAppUpdate(this)">Actualizar</button>`;
  document.body.appendChild(d);
}
async function checkAppVersion(){
  const remote=await getRemoteVersion();
  LATEST_REMOTE_VERSION=remote.version||APP_VERSION;
  try{
    localStorage.setItem('casaplan_installed_version',String(APP_VERSION));

function repeatFields(cfg={enabled:false},prefix='',suffix=''){let days=['L','M','X','J','V','S','D'];return `<label class="item small" style="margin:0"><input type="checkbox" name="${prefix}repeat_enabled" ${cfg.enabled?'checked':''} style="width:auto;margin-right:8px" onchange="toggleRepeatBuilder(this,'repeatBuilder${suffix}')"> Repetir esta tarea</label><div id="repeatBuilder${suffix}" class="repeatBuilder grid ${cfg.enabled?'':'hidden'}"><div class="grid grid2"><label class="small muted">Cada<input name="${prefix}repeat_interval" type="number" min="1" max="365" value="${cfg.interval||1}"></label><label class="small muted">Periodo<select name="${prefix}repeat_unit" onchange="repeatUnitChanged(this,'weekdayBlock${suffix}')"><option value="day" ${cfg.unit==='day'?'selected':''}>Días</option><option value="week" ${(!cfg.unit||cfg.unit==='week')?'selected':''}>Semanas</option><option value="month" ${cfg.unit==='month'?'selected':''}>Meses</option><option value="year" ${cfg.unit==='year'?'selected':''}>Años</option></select></label></div><div id="weekdayBlock${suffix}" class="${cfg.unit&&cfg.unit!=='week'?'hidden':''}"><div class="muted small" style="margin-bottom:6px">Días de la semana</div><div class="weekdayGrid">${days.map((d,i)=>`<label class="weekdayChip"><input type="checkbox" name="${prefix}repeat_weekdays" value="${i+1}" ${(cfg.weekdays||[]).includes(i+1)?'checked':''}>${d}</label>`).join('')}</div></div><label class="small muted">Calcular la siguiente<select name="${prefix}repeat_basis"><option value="scheduled" ${cfg.basis!=='completed'?'selected':''}>Desde la fecha programada</option><option value="completed" ${cfg.basis==='completed'?'selected':''}>Desde que se completa</option></select></label><label class="small muted">Asignación<select name="${prefix}repeat_assignee"><option value="same" ${cfg.assignee!=='rotate'&&cfg.assignee!=='all'?'selected':''}>Mantener las mismas personas</option><option value="rotate" ${cfg.assignee==='rotate'?'selected':''}>Rotación automática</option><option value="all" ${cfg.assignee==='all'?'selected':''}>Asignar a todos</option></select></label><label class="small muted">Finalizar repetición (opcional)<input name="${prefix}repeat_until" type="date" value="${cfg.until||''}"></label><div class="repeatSummary">La siguiente tarea se crea al finalizar la actual, por lo que no se acumulan copias pendientes.</div></div>`}
function checklistComplete(t){let items=taskChecklist(t);return !items.length||items.every(x=>x.done)}
function checklistProgress(t){let items=taskChecklist(t),done=items.filter(x=>x.done).length;return {items,done,total:items.length,pct:items.length?Math.round(done/items.length*100):100}}
function checklistWaitRemaining(item){if(!item?.done||!item.waitMinutes||!item.doneAt)return 0;return Math.max(0,new Date(item.doneAt).getTime()+item.waitMinutes*60000-Date.now())}
function formatWait(ms){if(ms<=0)return '';let secs=Math.ceil(ms/1000),mins=Math.floor(secs/60),rest=secs%60;if(mins>=60){let h=Math.floor(mins/60),m=mins%60;return `${h} h ${m} min`}return mins?`${mins} min ${rest} s`:`${rest} s`}
function checklistItemUnlocked(items,index){if(index===0)return true;for(let i=0;i<index;i++){if(!items[i].done||checklistWaitRemaining(items[i])>0)return false}return true}
function checklistNextWaitText(items,index){if(index===0)return '';for(let i=0;i<index;i++){if(!items[i].done)return `Completa primero: ${items[i].text}`;let remaining=checklistWaitRemaining(items[i]);if(remaining>0)return `Se desbloquea en ${formatWait(remaining)}`}return ''}
function setChecklistMeta(desc,items){let txt=String(desc||'').replace(/(?:^|\n)\[CHECKLIST_B64:[^\]]+\]/g,'').trim();if(!items||!items.length)return txt;let meta='[CHECKLIST_B64:'+encodeChecklist(items)+']';return (meta+(txt?'\n'+txt:'')).trim()}
async function toggleChecklistItem(taskId,index,checked){let t=state.tasks.find(x=>x.id===taskId);if(!t||t.status==='done')return;let items=taskChecklist(t);if(!items[index])return;if(checked&&!checklistItemUnlocked(items,index))return alert(checklistNextWaitText(items,index)||'Este punto todavía está bloqueado.');items[index].done=!!checked;items[index].doneAt=checked?new Date().toISOString():'';if(!checked){for(let i=index+1;i<items.length;i++){items[i].done=false;items[i].doneAt=''}}let description=setChecklistMeta(t.description,items);let r=await sb.from('tasks').update({description}).eq('id',taskId).neq('status','done');if(r.error)alert(r.error.message);else await loadAll()}
function checklistHtml(t){let p=checklistProgress(t);if(!p.total)return '';return `<div class="taskChecklist"><div class="taskChecklistHead"><b>Checklist</b><span class="pill ${p.done===p.total?'ok':'blue'}">${p.done}/${p.total}</span></div><div class="checkProgress"><i style="width:${p.pct}%"></i></div>${p.items.map((x,i)=>{let unlocked=checklistItemUnlocked(p.items,i),remaining=checklistWaitRemaining(x),lockText=!unlocked?checklistNextWaitText(p.items,i):'';return `<label class="taskChecklistItem ${x.done?'done':''} ${!unlocked?'locked':''}"><input type="checkbox" ${x.done?'checked':''} ${(t.status==='done'||!unlocked)?'disabled':''} onchange="toggleChecklistItem('${t.id}',${i},this.checked)"><span>${esc(x.text)}${x.waitMinutes?`<small class="checkWait">${x.done&&remaining>0?'⏳ '+esc(formatWait(remaining)):'espera '+x.waitMinutes+' min'}</small>`:''}${lockText?`<div class="muted tiny" style="margin-top:4px">🔒 ${esc(lockText)}</div>`:''}</span></label>`}).join('')}${p.done<p.total&&t.status==='in_progress'?'<div class="checkLocked">Completa los puntos en orden. Los pasos con espera desbloquearán el siguiente cuando termine su cuenta atrás.</div>':''}</div>`}
function toggleChecklistBuilder(cb){let box=document.getElementById('checklistBuilder');if(!box)return;box.classList.toggle('hidden',!cb.checked);if(cb.checked&&!box.querySelector('.checkRow'))addChecklistRow()}
function checklistWaitOptions(selected=0){let vals=[0,1,2,5,10,15,20,30,45,60,90,120];return vals.map(v=>`<option value="${v}" ${Number(selected)===v?'selected':''}>${v?`Esperar ${v} min`:'Sin espera'}</option>`).join('')}
function addChecklistRow(value='',waitMinutes=0){let box=document.getElementById('checklistRows');if(!box)return;let row=document.createElement('div');row.className='checkRow';row.innerHTML=`<input name="check_items" placeholder="Ej. Poner la lavadora" value="${esc(value)}"><select name="check_wait_minutes" class="checkWaitSelect" title="Tiempo para desbloquear el siguiente punto">${checklistWaitOptions(waitMinutes)}</select><button type="button" class="btn ghost" onclick="this.parentElement.remove()">✕</button>`;box.appendChild(row)}
function taskMinMinutes(t){let m=String(t?.description||'').match(/\[MIN_MINUTES:(\d+)\]/);return m?Math.max(0,Number(m[1])||0):0}
function taskStartedAt(t){let m=String(t?.description||'').match(/\[STARTED_AT:([^\]]+)\]/);return m?m[1]:''}
function taskTimeReady(t){let mins=taskMinMinutes(t),started=taskStartedAt(t);if(!mins)return true;if(!started)return false;return Date.now()>=new Date(started).getTime()+mins*60000}
function taskRemainingText(t){let mins=taskMinMinutes(t),started=taskStartedAt(t);if(!mins)return '';if(!started)return `Tiempo mínimo: ${mins} min`;let ms=Math.max(0,new Date(started).getTime()+mins*60000-Date.now());if(ms<=0)return 'Tiempo mínimo cumplido. Ya se puede finalizar.';let total=Math.ceil(ms/60000);return `Podrás finalizar en ${total} min` }
function setTaskMeta(desc,key,value){let txt=String(desc||'').replace(new RegExp(`(?:^|\\n)\\[${key}:[^\\]]+\\]`,'g'),'').trim();return (`[${key}:${value}]`+(txt?'\n'+txt:'')).trim()}
function removeTaskMeta(desc,key){return String(desc||'').replace(new RegExp(`(?:^|\\n)\\[${key}:[^\\]]+\\]`,'g'),'').trim()}
function packDesc(roomId,desc,photoRequired=false,minMinutes=0,checkItems=[]){let meta=[];if(roomId&&roomId!=='sin-zona')meta.push(`[ROOM:${roomId}]`);if(photoRequired)meta.push('[PHOTO_REQUIRED:1]');if(Number(minMinutes)>0)meta.push(`[MIN_MINUTES:${Math.round(Number(minMinutes))}]`);if(checkItems&&checkItems.length)meta.push(`[CHECKLIST_B64:${encodeChecklist(checkItems.map(x=>({text:String(x.text||x).trim(),done:!!x.done,waitMinutes:Math.max(0,Number(x.waitMinutes)||0),doneAt:x.doneAt||''})).filter(x=>x.text))}]`);let body=String(desc||'').trim();return meta.concat(body?[body]:[]).join('\n').trim()}
function roomOptions(sel=''){return `<option value="sin-zona" ${sel==='sin-zona'?'selected':''}>Sin habitación</option>`+rooms().map(r=>`<option value="${esc(r.id)}" ${sel===r.id?'selected':''}>${esc(r.icon)} ${esc(r.name)}</option>`).join('')}
function roomStats(id){let ts=state.tasks.filter(t=>taskRoomId(t)===id), pending=ts.filter(t=>t.status!=='done').length, late=ts.filter(t=>taskIsLate(t)).length;return {total:ts.length,pending,late,done:ts.length-pending}}
async function setTaskRoom(id,roomId){if(!requireAdmin('Solo el administrador puede cambiar habitaciones de tareas.'))return;let t=state.tasks.find(x=>x.id===id);if(!t)return;await sb.from('tasks').update({description:packDesc(roomId,cleanDesc(t),taskNeedsPhoto(t))}).eq('id',id)}
async function addRoom(ev){ev.preventDefault();if(!requirePermission('manage_rooms','No tienes permiso para crear habitaciones.'))return;let f=new FormData(ev.target),name=f.get('name').trim(),icon=f.get('icon').trim()||'🏠';if(!name)return;let id=slugRoom(name);if(rooms().some(r=>r.id===id))id+='-'+Date.now().toString().slice(-4);let r=await sb.from('rooms').insert({family_id:state.family.id,id,name,icon,is_default:false});if(r.error)alert(r.error.message);else ev.target.reset()}
async function delRoom(id){if(!requirePermission('manage_rooms','No tienes permiso para borrar habitaciones.'))return;let r=room(id);if(!r||r.is_default)return alert('Las habitaciones base no se eliminan. Puedes dejarla sin usar.');if(roomStats(id).total)return alert('Antes mueve o elimina las tareas de esta habitación.');let res=await sb.from('rooms').delete().eq('family_id',state.family.id).eq('id',id);if(res.error)alert(res.error.message)}
function pickRoom(id){state.roomFilter=id;openTab('habitaciones');renderHabitaciones()}

function photoKey(taskId){return `casaplan_task_photos_${CONFIG.FAMILY_CODE}_${taskId}`}
function localPhotos(taskId){try{return JSON.parse(localStorage.getItem(photoKey(taskId))||'[]')}catch{return []}}
function saveLocalPhotos(taskId,photos){localStorage.setItem(photoKey(taskId),JSON.stringify(photos.slice(0,8)))}
function getTaskPhotos(taskId){return state.photoCache[taskId]||localPhotos(taskId)||[]}
function photoPath(taskId,fileName=''){return `${CONFIG.FAMILY_CODE}/${taskId}/${fileName}`.replace(/\\/g,'/')}
function resizeBlob(file,max=1280,quality=.78){return new Promise((resolve,reject)=>{let img=new Image();let fr=new FileReader();fr.onload=()=>{img.onload=()=>{let scale=Math.min(1,max/Math.max(img.width,img.height));let c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);c.getContext('2d').drawImage(img,0,0,c.width,c.height);c.toBlob(b=>b?resolve(b):reject(new Error('No se pudo comprimir la foto')),'image/jpeg',quality)};img.onerror=reject;img.src=fr.result};fr.onerror=reject;fr.readAsDataURL(file)})}
function resizeImage(file){return new Promise((resolve,reject)=>{let reader=new FileReader();reader.onerror=()=>reject(new Error('No se pudo leer la imagen'));reader.onload=()=>{let img=new Image();img.onerror=()=>reject(new Error('No se pudo cargar la imagen'));img.onload=()=>{let max=1200,scale=Math.min(1,max/Math.max(img.width,img.height));let canvas=document.createElement('canvas');canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);let ctx=canvas.getContext('2d');ctx.drawImage(img,0,0,canvas.width,canvas.height);resolve(canvas.toDataURL('image/jpeg',0.74))};img.src=reader.result};reader.readAsDataURL(file)})}
async function refreshTaskPhotos(taskId){let local=localPhotos(taskId);try{let {data,error}=await sb.storage.from(CONFIG.PHOTO_BUCKET).list(photoPath(taskId),{limit:100,sortBy:{column:'created_at',order:'asc'}});if(error)throw error;let cloud=(data||[]).filter(x=>x.name&&!x.name.endsWith('/')).map(x=>{let path=photoPath(taskId,x.name);let pub=sb.storage.from(CONFIG.PHOTO_BUCKET).getPublicUrl(path);return {id:x.name,src:pub.data.publicUrl,created_at:x.created_at||x.updated_at||'',cloud:true,path}});state.photoCache[taskId]=cloud.concat(local.filter(lp=>!cloud.some(cp=>cp.id===lp.id))).slice(0,8);state.photoError=''}catch(err){state.photoCache[taskId]=local;state.photoError='Fotos en modo local: falta configurar Supabase Storage o permisos del bucket task-photos.'}}
async function refreshAllPhotos(){await Promise.all((state.tasks||[]).map(t=>refreshTaskPhotos(t.id)))}
async function addTaskPhoto(ev,taskId){let files=[...ev.target.files];if(!files.length)return;let photos=getTaskPhotos(taskId);try{for(const file of files){if(!file.type.startsWith('image/'))continue;if(photos.length>=8){alert('Máximo 8 fotos por tarea en esta versión.');break}let id=`${Date.now()}-${Math.random().toString(16).slice(2)}.jpg`;let uploaded=false;try{let blob=await resizeBlob(file);let up=await sb.storage.from(CONFIG.PHOTO_BUCKET).upload(photoPath(taskId,id),blob,{contentType:'image/jpeg',upsert:false});if(up.error)throw up.error;uploaded=true}catch(cloudErr){let local=localPhotos(taskId);local.push({id,src:await resizeImage(file),created_at:new Date().toISOString(),cloud:false});saveLocalPhotos(taskId,local);state.photoError='No se pudo subir a Supabase Storage. La foto quedó solo en este dispositivo.'}photos=uploaded?photos.concat([{id,cloud:true}]):localPhotos(taskId)}await refreshTaskPhotos(taskId);render()}catch(err){alert(err.message||'No se pudo guardar la foto.')}finally{ev.target.value=''}}
async function delTaskPhoto(taskId,photoId){let p=getTaskPhotos(taskId).find(x=>x.id===photoId);if(p?.cloud&&p.path){await sb.storage.from(CONFIG.PHOTO_BUCKET).remove([p.path])}else{saveLocalPhotos(taskId,localPhotos(taskId).filter(x=>x.id!==photoId))}await refreshTaskPhotos(taskId);render()}
function openPhoto(src){let d=document.createElement('div');d.className='photoModal';d.innerHTML=`<button class="closePhoto" onclick="this.parentElement.remove()">×</button><img src="${src}" alt="Foto de tarea">`;d.onclick=e=>{if(e.target===d)d.remove()};document.body.appendChild(d)}
function photoBlock(taskId){let photos=getTaskPhotos(taskId);let cloudCount=photos.filter(p=>p.cloud).length;let label=state.photoError&&cloudCount===0?`${photos.length}/8 fotos locales`:`${photos.length}/8 fotos sincronizadas`;return `<div class="photoActions"><label class="fileBtn">Añadir foto<input type="file" accept="image/*" capture="environment" multiple onchange="addTaskPhoto(event,'${taskId}')"></label><span class="muted small">${label}</span></div>${photos.length?`<div class="photoGrid">${photos.map(p=>`<div class="photoThumb"><img src="${p.src}" onclick="openPhoto(this.src)" alt="Foto"><button onclick="delTaskPhoto('${taskId}','${p.id}')">×</button></div>`).join('')}</div>`:''}`}

function incidentPhotoKey(id){return `casaplan_incident_photos_${CONFIG.FAMILY_CODE}_${id}`}
function incidentPath(id,fileName=''){return `${CONFIG.FAMILY_CODE}/incidents/${id}/${fileName}`.replace(/\\/g,'/')}
function localIncidentPhotos(id){try{return JSON.parse(localStorage.getItem(incidentPhotoKey(id))||'[]')}catch{return []}}
function saveLocalIncidentPhotos(id,photos){localStorage.setItem(incidentPhotoKey(id),JSON.stringify(photos.slice(0,10)))}
function getIncidentPhotos(id){return state.incidentPhotoCache[id]||localIncidentPhotos(id)||[]}
async function refreshIncidentPhotos(id){let local=localIncidentPhotos(id);try{let {data,error}=await sb.storage.from(CONFIG.PHOTO_BUCKET).list(incidentPath(id),{limit:100,sortBy:{column:'created_at',order:'asc'}});if(error)throw error;let cloud=(data||[]).filter(x=>x.name&&!x.name.endsWith('/')).map(x=>{let path=incidentPath(id,x.name);let pub=sb.storage.from(CONFIG.PHOTO_BUCKET).getPublicUrl(path);return {id:x.name,src:pub.data.publicUrl,created_at:x.created_at||x.updated_at||'',cloud:true,path}});state.incidentPhotoCache[id]=cloud.concat(local.filter(lp=>!cloud.some(cp=>cp.id===lp.id))).slice(0,10)}catch(err){state.incidentPhotoCache[id]=local}}
async function refreshAllIncidentPhotos(){await Promise.all((state.incidents||[]).map(i=>refreshIncidentPhotos(i.id)))}
async function addIncidentPhoto(ev,id){let files=[...ev.target.files];if(!files.length)return;let photos=getIncidentPhotos(id);try{for(const file of files){if(!file.type.startsWith('image/'))continue;if(photos.length>=10){alert('Máximo 10 fotos por incidencia.');break}let name=`${Date.now()}-${Math.random().toString(16).slice(2)}.jpg`;let uploaded=false;try{let blob=await resizeBlob(file);let up=await sb.storage.from(CONFIG.PHOTO_BUCKET).upload(incidentPath(id,name),blob,{contentType:'image/jpeg',upsert:false});if(up.error)throw up.error;uploaded=true}catch(e){let local=localIncidentPhotos(id);local.push({id:name,src:await resizeImage(file),created_at:new Date().toISOString(),cloud:false});saveLocalIncidentPhotos(id,local)}photos=uploaded?photos.concat([{id:name,cloud:true}]):localIncidentPhotos(id)}await refreshIncidentPhotos(id);render()}catch(err){alert(err.message||'No se pudo guardar la foto.')}finally{ev.target.value=''}}
async function delIncidentPhoto(id,photoId){let p=getIncidentPhotos(id).find(x=>x.id===photoId);if(p?.cloud&&p.path){await sb.storage.from(CONFIG.PHOTO_BUCKET).remove([p.path])}else{saveLocalIncidentPhotos(id,localIncidentPhotos(id).filter(x=>x.id!==photoId))}await refreshIncidentPhotos(id);render()}
function incidentPhotoBlock(id){let photos=getIncidentPhotos(id);return `<div class="photoActions"><label class="fileBtn">Añadir foto<input type="file" accept="image/*" capture="environment" multiple onchange="addIncidentPhoto(event,'${id}')"></label><span class="muted small">${photos.length}/10 fotos</span></div>${photos.length?`<div class="photoGrid">${photos.map(p=>`<div class="photoThumb"><img src="${p.src}" onclick="openPhoto(this.src)" alt="Foto incidencia"><button onclick="delIncidentPhoto('${id}','${p.id}')">×</button></div>`).join('')}</div>`:''}`}
function incidentStatusLabel(s){return s==='in_progress'?'En proceso':s==='solved'?'Solucionada':'Abierta'}
function incidentPriorityLabel(p){return p==='urgent'?'Urgente':p==='high'?'Alta':p==='medium'?'Media':'Baja'}
function incidentRoomName(i){let r=room(i.room_id);return r?`${r.icon} ${r.name}`:'Sin habitación'}
async function addIncident(ev){ev.preventDefault();let f=new FormData(ev.target);let title=f.get('title').trim();if(!title)return;let obj={family_id:state.family.id,title,description:f.get('description')||'',room_id:f.get('room_id')||'sin-zona',priority:f.get('priority')||'medium',status:'open',created_by_member_id:state.currentMemberId||null};let r=await sb.from('incidents').insert(obj).select().single();if(r.error){alert(r.error.message);return}ev.target.reset();await loadAll();openTab('incidencias')}
async function setIncidentStatus(id,status){let obj={status};if(status==='solved'){obj.resolved_at=new Date().toISOString();obj.resolved_by_member_id=state.currentMemberId||null}else{obj.resolved_at=null;obj.resolved_by_member_id=null}let r=await sb.from('incidents').update(obj).eq('id',id);if(r.error)alert(r.error.message)}
async function deleteIncident(id){if(confirm('¿Eliminar esta incidencia?'))await sb.from('incidents').delete().eq('id',id)}
async function incidentToTask(id){let i=state.incidents.find(x=>x.id===id);if(!i)return;let title=(i.title||'Incidencia').trim();let obj={family_id:state.family.id,title:'Resolver: '+title,description:packDesc(i.room_id,cleanDesc({description:i.description||''}),false),member_id:null,start_date:today(),end_date:today(),due_date:today(),repeat:'none',points:1,status:'pending'};let r=await sb.from('tasks').insert(obj).select().single();if(r.error){alert(r.error.message);return}alert('Incidencia convertida en tarea.');openTab('hoy');await loadAll()}
function incidentCard(i){let created=i.created_at?new Date(i.created_at).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';let creator=member(i.created_by_member_id);let resolver=member(i.resolved_by_member_id);let photos=getIncidentPhotos(i.id).length;return `<div class="item ${i.status==='solved'?'incidentSolved':'incidentOpen'}"><div class="between"><div><div class="roomTaskTitle"><b>${esc(i.title)}</b><span class="pill blue">${esc(incidentRoomName(i))}</span><span class="pill ${i.status==='solved'?'ok':(i.status==='in_progress'?'blue':'bad')}">${incidentStatusLabel(i.status)}</span><span class="pill"><span class="priority ${(i.priority||'medium')}">${incidentPriorityLabel(i.priority)}</span></span>${photos?`<span class="pill">📷 ${photos}</span>`:''}</div><div class="muted small">Creada ${created}${creator?` · por ${esc(creator.name)}`:''}${resolver?` · resuelta por ${esc(resolver.name)}`:''}</div>${i.description?`<div class="small" style="margin-top:7px">${esc(i.description)}</div>`:''}</div></div>${incidentPhotoBlock(i.id)}<div class="row wrap" style="margin-top:12px">${i.status!=='open'?`<button class="btn ghost" onclick="setIncidentStatus('${i.id}','open')">Abrir</button>`:''}${i.status!=='in_progress'?`<button class="btn secondary" onclick="setIncidentStatus('${i.id}','in_progress')">En proceso</button>`:''}${i.status!=='solved'?`<button class="btn ok" onclick="setIncidentStatus('${i.id}','solved')">Solucionada</button>`:''}<button class="btn ghost" onclick="incidentToTask('${i.id}')">Convertir en tarea</button><button class="btn danger" onclick="deleteIncident('${i.id}')">Eliminar</button></div></div>`}



function setConn(ok,text){$('#connDot').className='dot '+(ok?'ok':text==='Conectando'?'':'bad');$('#connText').textContent=text}
async function init(){try{if(!sb)throw new Error('No se cargó Supabase. Revisa conexión a internet.');setConn(false,'Conectando');let {data:f,error:e}=await sb.from('families').select('*').eq('invite_code',CONFIG.FAMILY_CODE).single();if(e&&e.code!=='PGRST116')throw e;if(!f){let r=await sb.from('families').insert({name:'CasaPlan Familia',invite_code:CONFIG.FAMILY_CODE}).select().single();if(r.error)throw r.error;f=r.data}state.family=f;await ensureMembers();await ensureRooms();await loadAll();await cleanupDoneTasksPreviousMonth(false);subscribe();setConn(true,'Sincronizado')}catch(err){state.error=err.message||String(err);setConn(false,'Error');render()}}
async function ensureMembers(){let r=await sb.from('members').select('*').eq('family_id',state.family.id);if(r.error)throw r.error;if(!r.data.length){await sb.from('members').insert([{family_id:state.family.id,name:'Mamá',color:'#ef4444'},{family_id:state.family.id,name:'Papá',color:'#2563eb'},{family_id:state.family.id,name:'Hijo/a',color:'#16a34a'}])}}

async function loadAll(options={}){

    sb.from('members').select('*').eq('family_id',fid).order('created_at'),
    sb.from('tasks').select('*').eq('family_id',fid).order('start_date'),
    sb.from('task_assignments').select('*').eq('family_id',fid).order('created_at'),
    sb.from('shopping_items').select('*').eq('family_id',fid).order('created_at'),
    sb.from('household_inventory').select('*').eq('family_id',fid).order('name'),
    sb.from('rooms').select('*').eq('family_id',fid).order('sort_order').order('created_at'),
    sb.from('incidents').select('*').eq('family_id',fid).order('created_at',{ascending:false}),

  ]);

  if(r.error){state.rooms=defaultRooms;state.error='Falta la tabla public.rooms en Supabase.'}else{state.rooms=r.data&&r.data.length?r.data:defaultRooms}
  if(inc.error){state.incidents=[];state.error='Falta la tabla public.incidents en Supabase.'}else{state.incidents=inc.data||[]}
  if(tp.error){state.taskTemplates=localTaskTemplates();state.error='Falta la tabla public.task_templates.'}else{state.taskTemplates=tp.data||[]}
  await refreshAllPhotos();await refreshAllIncidentPhotos();
  if(options.deferRender&&uiInteractionBusy()){deferredUiRefresh=true;}else{preserveViewport(()=>render());deferredUiRefresh=false;}

function normTaskText(v){return String(v||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9ñ\s]/g,' ').replace(/\s+/g,' ').trim()}
function titleSimilarity(a,b){a=normTaskText(a);b=normTaskText(b);if(!a||!b)return 0;if(a===b)return 1;if(a.includes(b)||b.includes(a))return .86;let aw=[...new Set(a.split(' ').filter(x=>x.length>2))],bw=[...new Set(b.split(' ').filter(x=>x.length>2))];if(!aw.length||!bw.length)return 0;let common=aw.filter(x=>bw.includes(x)).length;return common/Math.max(aw.length,bw.length)}
function formAssignedIds(form){return [...form.querySelectorAll('input[name="member_ids"]:checked')].map(x=>x.value)}
function sameMembersScore(a,b){if(!a.length&&!b.length)return .5;let A=new Set(a),B=new Set(b);let inter=[...A].filter(x=>B.has(x)).length;return inter/Math.max(A.size,B.size,1)}
function duplicateCandidates(data){return state.tasks.filter(t=>t.status!=='done').map(t=>{let score=titleSimilarity(data.title,t.title);let roomScore=(data.room_id||'sin-zona')===(taskRoomId(t)||'sin-zona')?.14:0;let memScore=sameMembersScore(data.member_ids||[],assignedMembers(t).map(m=>m.id))*.14;let total=score*.72+roomScore+memScore;return {task:t,total}}).filter(x=>x.total>=.56).sort((a,b)=>b.total-a.total).slice(0,3)}
function saveTaskDraft(form){
  if(!form)return;
  const draft={values:{},checks:{},checkItems:[],checkWaits:[],checklistEnabled:false,updatedAt:Date.now()};
  [...form.elements].forEach(el=>{
    if(!el.name)return;
    if(el.name==='check_items'){draft.checkItems.push(el.value);return}
    if(el.name==='check_wait_minutes'){draft.checkWaits.push(el.value);return}
    if(el.type==='checkbox'||el.type==='radio'){
      if(!draft.checks[el.name])draft.checks[el.name]=[];
      if(el.checked)draft.checks[el.name].push(el.value||'on');
    }else draft.values[el.name]=el.value;
  });
  draft.checklistEnabled=!!form.querySelector('[name="checklist_enabled"]:checked');
  state.taskCreateDraft=draft;
  try{sessionStorage.setItem('casaplan_task_create_draft',JSON.stringify(draft))}catch(e){}
}
function getTaskDraft(){
  if(state.taskCreateDraft)return state.taskCreateDraft;
  try{return JSON.parse(sessionStorage.getItem('casaplan_task_create_draft')||'null')}catch(e){return null}
}
function clearTaskDraft(){state.taskCreateDraft=null;try{sessionStorage.removeItem('casaplan_task_create_draft')}catch(e){}}
function restoreTaskDraft(){
  const form=document.getElementById('taskCreateForm'),draft=getTaskDraft();
  if(!form||!draft)return;
  Object.entries(draft.values||{}).forEach(([name,value])=>{let el=form.elements[name];if(el&&typeof el.value!=='undefined')el.value=value});
  [...form.querySelectorAll('input[type="checkbox"],input[type="radio"]')].forEach(el=>{let vals=(draft.checks||{})[el.name]||[];el.checked=vals.includes(el.value||'on')});
  const enabled=form.querySelector('[name="checklist_enabled"]');
  if(enabled){enabled.checked=!!draft.checklistEnabled;toggleChecklistBuilder(enabled);let rows=document.getElementById('checklistRows');if(rows)rows.innerHTML='';if(draft.checklistEnabled)(draft.checkItems||[]).forEach((v,i)=>addChecklistRow(v,(draft.checkWaits||[])[i]||0));}
  let rep=form.querySelector('[name="repeat_enabled"]');if(rep)toggleRepeatBuilder(rep);let unit=form.querySelector('[name="repeat_unit"]');if(unit)repeatUnitChanged(unit);renderDuplicateWarning();
}

function renderDuplicateWarning(){let form=document.getElementById('taskCreateForm'),box=document.getElementById('duplicateBox');if(!form||!box)return;let data={title:form.title.value,room_id:form.room_id.value,member_ids:formAssignedIds(form)};let matches=duplicateCandidates(data);if(!data.title||!matches.length){box.className='duplicateBox';box.innerHTML='';return}box.className='duplicateBox visible';box.innerHTML=`<b>⚠️ Posible tarea duplicada</b><div class="small" style="margin-top:4px">Ya existe una tarea parecida. Puedes usar la existente o crearla igualmente si es otra cosa.</div>${matches.map(x=>{let t=x.task,r=room(taskRoomId(t));return `<div class="duplicateItem"><div><b>${esc(t.title)}</b></div><div class="muted tiny">${r?esc(r.icon)+' '+esc(r.name)+' · ':''}${taskDateLine(t)} · ${esc(assignedLabel(t))}</div><div class="row wrap" style="margin-top:8px"><button type="button" class="btn secondary" onclick="goToExistingTask('${t.id}')">Ver existente</button><button type="button" class="btn ghost" onclick="allowDuplicateCreate()">Crear igualmente</button></div></div>`}).join('')}`}

async function addTask(ev){ev.preventDefault();if(!requirePermission('create_tasks','No tienes permiso para crear tareas.'))return;let form=ev.target;let f=new FormData(form);let title=f.get('title').trim();if(!title)return;let ids=f.getAll('member_ids').filter(Boolean);let start=f.get('start_date')||f.get('due_date')||today();let end=f.get('end_date')||start;if(end<start){alert('La fecha límite no puede ser anterior a la fecha de inicio.');return}let data={title,room_id:f.get('room_id'),member_ids:ids};let dupes=duplicateCandidates(data);if(dupes.length&&f.get('force_create')!=='1'){renderDuplicateWarning();alert('He encontrado una tarea parecida. Revisa el aviso antes de crear otra igual.');return}let checkTexts=f.getAll('check_items'),checkWaits=f.getAll('check_wait_minutes');let checkItems=f.get('checklist_enabled')==='on'?checkTexts.map((x,i)=>({text:String(x||'').trim(),done:false,waitMinutes:Math.max(0,Number(checkWaits[i])||0),doneAt:''})).filter(x=>x.text):[];let repeatCfg=repeatConfigFromForm(f);let description=packDesc(f.get('room_id'),f.get('description'),f.get('photo_required')==='on',f.get('min_minutes'),checkItems);description=setRepeatMeta(description,repeatCfg);let obj={family_id:state.family.id,title,description,member_id:ids[0]||null,start_date:start,end_date:end,due_date:end,repeat:'none',points:Number(f.get('points')||1),status:'pending'};let r=await sb.from('tasks').insert(obj).select().single();if(r.error){alert(r.error.message);return}if(ids.length){let rows=ids.map(mid=>({family_id:state.family.id,task_id:r.data.id,member_id:mid,status:'pending'}));let ar=await sb.from('task_assignments').insert(rows);if(ar.error)alert(ar.error.message)}clearTaskDraft();form.reset();form.force_create.value='0';renderDuplicateWarning()}

const LEVELS=[{name:'Inicio',min:0,icon:'🌱'},{name:'Colaborador',min:25,icon:'⭐'},{name:'Organizador',min:75,icon:'🥉'},{name:'Experto del hogar',min:150,icon:'🥈'},{name:'Maestro de CasaPlan',min:300,icon:'🥇'},{name:'Leyenda del hogar',min:600,icon:'💎'}];
function memberLifetimeStats(memberId){
  let taskPoints=0,tasks=0,shops=0,incidents=0,dates=[];
  state.tasks.filter(t=>t.status==='done'&&t.completed_at).forEach(t=>{let done=completedByMembers(t);if(!done.length&&t.completed_by_member_id){let m=member(t.completed_by_member_id);if(m)done=[m]}if(done.some(m=>m.id===memberId)){tasks++;taskPoints+=Number(t.points||1)/(done.length||1);dates.push(iso(t.completed_at))}});
  state.shopping.filter(i=>i.bought&&i.bought_by_member_id===memberId).forEach(i=>{shops++;if(i.bought_at)dates.push(iso(i.bought_at))});
  state.incidents.filter(i=>i.status==='solved'&&i.resolved_by_member_id===memberId).forEach(i=>{incidents++;if(i.resolved_at)dates.push(iso(i.resolved_at))});
  let points=Math.round((taskPoints+shops*SHOP_POINTS_PER_ITEM+incidents*2)*10)/10;
  let streak=activityStreak(dates);return {tasks,shops,incidents,points,streak}
}
function activityStreak(dates){let set=new Set(dates.filter(Boolean));if(!set.size)return 0;let d=new Date();let key=iso(d);if(!set.has(key)){d.setDate(d.getDate()-1);key=iso(d);if(!set.has(key))return 0}let n=0;while(set.has(iso(d))){n++;d.setDate(d.getDate()-1)}return n}
function memberLevel(points){let current=LEVELS[0],next=null;for(let i=0;i<LEVELS.length;i++){if(points>=LEVELS[i].min)current=LEVELS[i];else{next=LEVELS[i];break}}let progress=next?Math.max(0,Math.min(100,((points-current.min)/(next.min-current.min))*100)):100;return {current,next,progress}}
function memberAchievements(memberId){let x=memberLifetimeStats(memberId);let defs=[['Primer paso','✅',x.tasks>=1,'Completar una tarea'],['Manos a la obra','🧹',x.tasks>=10,'Completar 10 tareas'],['Constancia','🏅',x.tasks>=50,'Completar 50 tareas'],['Centenario','💯',x.tasks>=100,'Completar 100 tareas'],['Comprador habitual','🛒',x.shops>=10,'Comprar 10 productos'],['Solucionador','🛠️',x.incidents>=5,'Resolver 5 incidencias'],['En racha','🔥',x.streak>=7,'Actividad durante 7 días seguidos']];return defs.map(d=>({name:d[0],icon:d[1],unlocked:d[2],desc:d[3]}))}
function gamificationMemberCard(m){let x=memberLifetimeStats(m.id),lv=memberLevel(x.points),ach=memberAchievements(m.id),unlocked=ach.filter(a=>a.unlocked);return `<div class="gameMember"><div class="gameMemberHead">${avatarHtml(m)}<div><b>${esc(m.name)}</b><div class="muted tiny">${lv.current.icon} ${lv.current.name} · ${x.points} pts totales</div></div><span class="pill ${x.streak?'warn':''}">🔥 ${x.streak}</span></div><div class="gameProgress"><div style="width:${lv.progress}%"></div></div><div class="muted tiny">${lv.next?`${Math.max(0,Math.ceil(lv.next.min-x.points))} puntos para ${lv.next.name}`:'Nivel máximo alcanzado'}</div><div class="achievementRow">${ach.map(a=>`<span class="achievement ${a.unlocked?'unlocked':'locked'}" title="${esc(a.desc)}">${a.icon}<small>${esc(a.name)}</small></span>`).join('')}</div><div class="muted tiny">${unlocked.length}/${ach.length} logros desbloqueados · ${x.tasks} tareas · ${x.shops} compras · ${x.incidents} incidencias</div></div>`}
function gamificationPanel(){return `<div class="card"><div class="between"><div><h2>🎮 Progreso y logros</h2><div class="muted small">Niveles por puntos acumulados, rachas e insignias.</div></div><span class="pill blue">${LEVELS.length} niveles</span></div><div class="gameList">${state.members.map(gamificationMemberCard).join('')||'<div class="empty">Sin miembros</div>'}</div></div>`}

function ranking(){
let monday=startWeek(0), sunday=addDays(monday,6);
let totals=Object.fromEntries(state.members.map(m=>[m.id,{taskPoints:0,shopPoints:0,points:0}]));
state.tasks.filter(t=>t.status==='done'&&t.completed_at&&iso(t.completed_at)>=monday&&iso(t.completed_at)<=sunday).forEach(t=>{
  let done=completedByMembers(t);
  if(!done.length&&t.completed_by_member_id){let m=member(t.completed_by_member_id);if(m)done=[m]}
  if(!done.length&&!taskAssignments(t.id).length&&t.member_id){let m=member(t.member_id);if(m)done=[m]}
  let share=Number(t.points||1)/(done.length||1);
  done.forEach(m=>{if(m&&totals[m.id])totals[m.id].taskPoints+=share})
});
state.shopping.filter(i=>i.bought&&i.bought_at&&i.bought_by_member_id&&iso(i.bought_at)>=monday&&iso(i.bought_at)<=sunday).forEach(i=>{
  if(totals[i.bought_by_member_id])totals[i.bought_by_member_id].shopPoints+=SHOP_POINTS_PER_ITEM;
});
return state.members.map(m=>{let t=totals[m.id]||{taskPoints:0,shopPoints:0};let taskPoints=Math.round(t.taskPoints*10)/10;let shopPoints=Math.round(t.shopPoints*10)/10;return {...m,taskPoints,shopPoints,points:Math.round((taskPoints+shopPoints)*10)/10}}).sort((a,b)=>b.points-a.points)
}

function rankMemberButton(m,i){return `<button class="rankButton" type="button" onclick="showRankDetail('${m.id}')">${avatarHtml(m)}<div><b>${i+1}. ${esc(m.name)}</b><div class="progress" style="margin-top:7px"><div class="bar" style="width:${Math.min(100,m.points*12)}%"></div></div><div class="muted tiny">Tareas ${m.taskPoints||0} · Compra ${m.shopPoints||0}</div></div><div class="rankScore"><b>${m.points}</b><div class="muted tiny">pts</div></div></button>`}
function weeklyRange(){let monday=startWeek(0),sunday=addDays(monday,6);return {monday,sunday}}
function rankDetailData(memberId){let {monday,sunday}=weeklyRange();let tasks=[],shops=[];state.tasks.filter(t=>t.status==='done'&&t.completed_at&&iso(t.completed_at)>=monday&&iso(t.completed_at)<=sunday).forEach(t=>{let done=completedByMembers(t);if(!done.length&&t.completed_by_member_id){let m=member(t.completed_by_member_id);if(m)done=[m]}if(!done.length&&!taskAssignments(t.id).length&&t.member_id){let m=member(t.member_id);if(m)done=[m]}if(done.some(m=>m.id===memberId)){let share=Number(t.points||1)/(done.length||1);tasks.push({task:t,points:Math.round(share*10)/10,people:done})}});state.shopping.filter(i=>i.bought&&i.bought_at&&i.bought_by_member_id===memberId&&iso(i.bought_at)>=monday&&iso(i.bought_at)<=sunday).forEach(i=>shops.push(i));tasks.sort((a,b)=>String(b.task.completed_at).localeCompare(String(a.task.completed_at)));shops.sort((a,b)=>String(b.bought_at).localeCompare(String(a.bought_at)));return {tasks,shops}}
function fmtShortDate(dt){return dt?new Date(dt).toLocaleString('es-ES',{weekday:'short',day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):''}
function showRankDetail(memberId){let m=member(memberId);if(!m)return;let rank=ranking().find(x=>x.id===memberId)||m;let d=rankDetailData(memberId);let taskPts=Math.round(d.tasks.reduce((a,x)=>a+x.points,0)*10)/10;let shopPts=d.shops.length*SHOP_POINTS_PER_ITEM;let total=Math.round((taskPts+shopPts)*10)/10;let taskHtml=d.tasks.length?d.tasks.map(x=>`<div class="rankLogItem"><div class="rankLogTop"><div><div class="rankLogTitle">✅ ${esc(x.task.title)}</div><div class="rankLogMeta">${fmtShortDate(x.task.completed_at)}${x.people.length>1?' · entre '+esc(peopleLabel(x.people)):''}</div></div><span class="pill ok">+${x.points}</span></div></div>`).join(''):'<div class="empty">No tiene tareas realizadas esta semana.</div>';let shopHtml=d.shops.length?d.shops.map(i=>`<div class="rankLogItem"><div class="rankLogTop"><div><div class="rankLogTitle">🛒 ${esc(i.title)}</div><div class="rankLogMeta">${fmtShortDate(i.bought_at)}${i.store?' · '+esc(i.store):''}${i.quantity?' · '+esc(i.quantity)+' '+esc(i.unit||''):''}</div></div><span class="pill ok">+${SHOP_POINTS_PER_ITEM}</span></div></div>`).join(''):'<div class="empty">No tiene compras puntuadas esta semana.</div>';let html=`<div class="rankDetailOverlay" onclick="closeRankDetail(event)"><div class="rankDetailPanel" onclick="event.stopPropagation()"><div class="rankDetailHead"><div class="rankDetailTitle">${avatarHtml(m)}<div><h2 style="margin:0">${esc(m.name)}</h2><div class="muted small">Detalle del ranking semanal</div></div></div><button class="rankClose" onclick="closeRankDetail()">×</button></div><div class="rankDetailStats"><div class="rankDetailStat"><b>${total}</b><div class="muted tiny">total</div></div><div class="rankDetailStat"><b>${taskPts}</b><div class="muted tiny">tareas</div></div><div class="rankDetailStat"><b>${shopPts}</b><div class="muted tiny">compra</div></div></div><div class="card" style="box-shadow:none;margin-bottom:10px"><h2>✅ Tareas realizadas</h2>${taskHtml}</div><div class="card" style="box-shadow:none;margin-bottom:0"><h2>🛒 Compra</h2>${shopHtml}</div></div></div>`;let old=document.getElementById('rankDetailOverlay');if(old)old.remove();document.body.insertAdjacentHTML('beforeend',html)}
function closeRankDetail(ev){if(ev&&ev.target&&ev.target.classList&&!ev.target.classList.contains('rankDetailOverlay'))return;let el=document.querySelector('.rankDetailOverlay');if(el)el.remove()}

function renderCompra(){
let pending=state.shopping.filter(i=>!i.bought), bought=state.shopping.filter(i=>i.bought);
let monday=startWeek(0), sunday=addDays(monday,6);
let weeklyShopPoints=bought.filter(i=>i.bought_at&&iso(i.bought_at)>=monday&&iso(i.bought_at)<=sunday).length*SHOP_POINTS_PER_ITEM;
let total=pending.reduce((a,i)=>a+(Number(i.estimated_price)||0),0);
let stores=[...new Set(pending.map(i=>i.store).filter(Boolean))];
let cats=['alimentacion','limpieza','higiene','hogar','mascotas','otros'];

let mostMap={};

let mostBought=Object.values(mostMap).sort((a,b)=>b.count-a.count||String(b.last).localeCompare(String(a.last))).slice(0,8);
let activeTitles=new Set(pending.map(i=>String(i.title||'').trim().toLowerCase()));
let grouped=cats.map(c=>[c,pending.filter(i=>(i.category||inferShopCategory(i.title))===c)]).filter(x=>x[1].length);
let quickButton=i=>`<button class="quickProduct" ${activeTitles.has(String(i.title).toLowerCase())?'disabled':''} onclick="repeatShop('${esc(String(i.title)).replace(/'/g,'&#39;')}','${esc(i.category||inferShopCategory(i.title))}','${esc(i.unit||'')}','${esc(i.store||'')}')"><b>${esc(i.title)} ${i.count?`<span class="pill">x${i.count}</span>`:''}</b><span>${shopCategoryIcon(i.category)} ${shopCategoryLabel(i.category)}${i.store?' · '+esc(i.store):''}${activeTitles.has(String(i.title).toLowerCase())?' · ya está en la lista':''}</span></button>`;
let compactShopCard=i=>`<div class="shopItem"><button class="shopCheck" onclick="toggleShop('${i.id}',${!i.bought})">${i.bought?'✓':'○'}</button><div class="shopItemMain"><b class="${i.bought?'done':''}">${esc(i.title)}</b><div class="meta"><span class="shopQty">${esc(i.quantity||'1')} ${esc(i.unit||'')}</span> · ${shopCategoryIcon(i.category||inferShopCategory(i.title))} ${shopCategoryLabel(i.category||inferShopCategory(i.title))}${i.store?' · '+esc(i.store):''}${i.estimated_price?' · '+Number(i.estimated_price).toFixed(2).replace('.',',')+' €':''}${i.bought_by_member_id?' · comprado por '+esc(member(i.bought_by_member_id)?.name||'')+' · +'+SHOP_POINTS_PER_ITEM+' punto' : (!i.bought?' · +'+SHOP_POINTS_PER_ITEM+' punto al comprar':'')}</div>${i.notes?`<div class="meta">${esc(i.notes)}</div>`:''}</div><div class="shopItemActions"><button class="btn danger" onclick="delShop('${i.id}')">Borrar</button></div></div>`;
$('#view-compra').innerHTML=`<div class="shopHero"><div class="shopHeroTop"><div><h2>Compra</h2><div class="sub">Lista rápida, productos habituales y total estimado.</div></div>${stores.length?`<span class="pill blue">${stores.length} tienda${stores.length>1?'s':''}</span>`:''}</div><div class="shopCounters"><div class="shopCounter"><b>${pending.length}</b><span>pendientes</span></div><div class="shopCounter"><b>${bought.length}</b><span>comprados</span></div><div class="shopCounter"><b>${total?total.toFixed(2).replace('.',',')+' €':'—'}</b><span>estimado</span></div><div class="shopCounter"><b>${weeklyShopPoints}</b><span>pts semana</span></div></div>${stores.length?`<div class="shopMeta"><span class="pill">${stores.map(esc).join(' · ')}</span></div>`:''}</div>
${inventoryPanel()}
<div class="card shopAddCompact"><h2>Añadir producto</h2><form onsubmit="addShop(event)" class="grid"><input name="title" placeholder="Producto" required><div class="grid grid2"><input name="quantity" placeholder="Cantidad" value="1"><select name="unit"><option value="">Sin unidad</option><option>uds</option><option>kg</option><option>g</option><option>L</option><option>ml</option><option>pack</option></select></div><div class="grid grid2"><select name="category"><option value="">Categoría automática</option><option value="alimentacion">🥕 Alimentación</option><option value="limpieza">🧽 Limpieza</option><option value="higiene">🧴 Higiene</option><option value="hogar">🏠 Hogar</option><option value="mascotas">🐾 Mascotas</option><option value="otros">🛒 Otros</option></select><input name="store" placeholder="Tienda"></div><div class="grid grid2"><input name="estimated_price" inputmode="decimal" placeholder="Precio"><input name="notes" placeholder="Nota"></div><button class="btn">Añadir</button></form></div>
<div class="card shopListCard"><div class="shopSectionTitle"><h2>⭐ Más comprados</h2>${mostBought.length?`<span class="pill">${mostBought.length}</span>`:''}</div>${mostBought.length?`<div class="quickProducts">${mostBought.map(quickButton).join('')}</div>`:`<div class="empty">Cuando marques productos como comprados, aquí aparecerán los habituales.</div>`}</div>
${history.length?`<div class="card shopListCard"><div class="shopSectionTitle"><h2>↻ Últimos comprados</h2></div><div class="quickProducts">${history.map(quickButton).join('')}</div></div>`:''}
<div class="card shopListCard"><div class="shopSectionTitle"><h2>🛒 Pendiente</h2><span class="pill blue">${pending.length}</span></div>${grouped.length?grouped.map(([c,items])=>`<div class="softPanel"><div class="shopCatTitle"><h3>${shopCategoryIcon(c)} ${shopCategoryLabel(c)}</h3><span class="pill">${items.length}</span></div>${items.map(compactShopCard).join('')}</div>`).join(''):'<div class="empty">No queda nada pendiente</div>'}</div>
<div class="card shopListCard"><div class="shopSectionTitle"><h2>✅ Comprado</h2><span class="pill">${bought.length}</span></div>${bought.length?bought.slice(0,30).map(compactShopCard).join(''):'<div class="empty">Todavía no hay productos comprados</div>'}</div>`
}

function adminEditChecklistRows(t){let items=taskChecklist(t);return items.map((x,i)=>`<div class="checkRow adminCheckRow"><input name="edit_check_items" placeholder="Punto del checklist" value="${esc(x.text)}"><select name="edit_check_wait_minutes" class="checkWaitSelect">${checklistWaitOptions(x.waitMinutes||0)}</select><button type="button" class="btn ghost" title="Subir" onclick="moveAdminChecklistRow(this,-1)">↑</button><button type="button" class="btn ghost" title="Bajar" onclick="moveAdminChecklistRow(this,1)">↓</button><button type="button" class="btn ghost" title="Eliminar" onclick="this.parentElement.remove()">✕</button></div>`).join('')}
function toggleAdminChecklist(taskId,checked){let box=document.getElementById('adminChecklist_'+taskId);if(!box)return;box.classList.toggle('hidden',!checked);if(checked&&!box.querySelector('.adminCheckRow'))addAdminChecklistRow(taskId)}
function addAdminChecklistRow(taskId,value='',waitMinutes=0){let box=document.getElementById('adminChecklistRows_'+taskId);if(!box)return;let row=document.createElement('div');row.className='checkRow adminCheckRow';row.innerHTML=`<input name="edit_check_items" placeholder="Punto del checklist" value="${esc(value)}"><select name="edit_check_wait_minutes" class="checkWaitSelect">${checklistWaitOptions(waitMinutes)}</select><button type="button" class="btn ghost" title="Subir" onclick="moveAdminChecklistRow(this,-1)">↑</button><button type="button" class="btn ghost" title="Bajar" onclick="moveAdminChecklistRow(this,1)">↓</button><button type="button" class="btn ghost" title="Eliminar" onclick="this.parentElement.remove()">✕</button>`;box.appendChild(row)}
function moveAdminChecklistRow(btn,dir){let row=btn.closest('.adminCheckRow');if(!row)return;let target=dir<0?row.previousElementSibling:row.nextElementSibling;if(!target)return;if(dir<0)row.parentElement.insertBefore(row,target);else row.parentElement.insertBefore(target,row)}
async function savePendingTaskEdit(ev,taskId){ev.preventDefault();if(!requirePermission('edit_tasks','No tienes permiso para editar tareas.'))return;let t=state.tasks.find(x=>x.id===taskId);if(!t||t.status!=='pending')return alert('Solo pueden editarse tareas que todavía están pendientes.');let form=ev.target,f=new FormData(form),title=String(f.get('title')||'').trim();if(!title)return alert('Escribe un nombre para la tarea.');let start=f.get('start_date')||today(),end=f.get('end_date')||start;if(end<start)return alert('La fecha límite no puede ser anterior a la fecha de inicio.');let ids=f.getAll('member_ids').filter(Boolean);let texts=f.getAll('edit_check_items'),waits=f.getAll('edit_check_wait_minutes');let checklist=f.get('checklist_enabled')==='on'?texts.map((x,i)=>({text:String(x||'').trim(),done:false,waitMinutes:Math.max(0,Number(waits[i])||0),doneAt:''})).filter(x=>x.text):[];let description=packDesc(f.get('room_id'),f.get('description'),f.get('photo_required')==='on',f.get('min_minutes'),checklist);description=setRepeatMeta(description,repeatConfigFromForm(f,'edit_'));let obj={title,description,member_id:ids[0]||null,start_date:start,end_date:end,due_date:end,repeat:'none',points:Math.max(1,Number(f.get('points'))||1)};let r=await sb.from('tasks').update(obj).eq('id',taskId).eq('status','pending').select('id');if(r.error)return alert(r.error.message);if(!r.data||!r.data.length)return alert('La tarea ya no está pendiente y no se ha modificado.');await sb.from('task_assignments').delete().eq('task_id',taskId);if(ids.length){let ar=await sb.from('task_assignments').insert(ids.map(mid=>({family_id:state.family.id,task_id:taskId,member_id:mid,status:'pending'})));if(ar.error)return alert(ar.error.message)}await loadAll();alert('Tarea pendiente actualizada.');}
function adminPendingTaskForm(t){let ids=taskAssignments(t.id).map(a=>a.member_id);if(!ids.length&&t.member_id)ids=[t.member_id];let checklist=taskChecklist(t),hasChecklist=checklist.length>0;return `<form class="item grid" onsubmit="savePendingTaskEdit(event,'${t.id}')"><div class="between wrap"><div><b>${esc(t.title)}</b><div class="muted tiny">Solo editable mientras siga pendiente</div></div><span class="pill">Pendiente</span></div><input name="title" value="${esc(t.title)}" required><textarea name="description" placeholder="Notas opcionales">${esc(cleanDesc(t))}</textarea><div><div class="muted small" style="margin-bottom:6px">Personas asignadas</div><div class="row wrap">${memberCheckboxes(ids)}</div></div><select name="room_id">${roomOptions(taskRoomId(t))}</select>${repeatFields(taskRepeatConfig(t),'edit_',t.id)}<div class="grid grid2"><label class="small muted">Fecha de inicio<input name="start_date" type="date" value="${taskStart(t)}" required></label><label class="small muted">Fecha límite<input name="end_date" type="date" value="${taskEnd(t)}" required></label></div><div class="grid grid2"><label class="small muted">Puntos<input name="points" type="number" min="1" max="20" value="${t.points||1}"></label><label class="small muted">Tiempo mínimo<select name="min_minutes">${[0,5,10,15,20,30,45,60].map(v=>`<option value="${v}" ${taskMinMinutes(t)===v?'selected':''}>${v?v+' minutos':'Sin tiempo mínimo'}</option>`).join('')}</select></label></div><label class="item small" style="margin:0"><input type="checkbox" name="photo_required" ${taskNeedsPhoto(t)?'checked':''} style="width:auto;margin-right:8px"> Exigir reporte fotográfico</label><label class="item small" style="margin:0"><input type="checkbox" name="checklist_enabled" ${hasChecklist?'checked':''} style="width:auto;margin-right:8px" onchange="toggleAdminChecklist('${t.id}',this.checked)"> Activar checklist</label><div id="adminChecklist_${t.id}" class="checkBuilder ${hasChecklist?'':'hidden'}"><div class="between"><div><b>Puntos del checklist</b><div class="muted tiny">Se guardan en este orden. La espera bloquea el punto siguiente.</div></div><button type="button" class="btn ghost" onclick="addAdminChecklistRow('${t.id}')">+ Punto</button></div><div id="adminChecklistRows_${t.id}">${adminEditChecklistRows(t)}</div></div><div class="row wrap"><button class="btn secondary" type="submit">Guardar cambios</button>${canPermission('create_tasks')?`<button class="btn ghost" type="button" onclick="saveTaskAsTemplate('${t.id}')">Guardar como plantilla</button>`:''}${canPermission('delete_tasks')?`<button class="btn danger" type="button" onclick="delTask('${t.id}')">Eliminar</button>`:''}</div></form>`}
function adminTaskEditor(){if(!canPermission('edit_tasks')&&!canPermission('delete_tasks'))return '';let pending=state.tasks.filter(t=>t.status==='pending').sort((a,b)=>String(taskStart(a)).localeCompare(String(taskStart(b))));return `<div class="item"><button class="btn ghost full" onclick="state.adminOpen=!state.adminOpen;renderAjustes()">Edición avanzada de tareas pendientes</button>${state.adminOpen?`<div class="success small" style="margin-top:10px">Aquí puedes modificar completamente las tareas que todavía no se han iniciado. Las tareas en proceso y realizadas quedan protegidas.</div>${pending.length?pending.map(adminPendingTaskForm).join(''):'<div class="empty">No hay tareas pendientes para editar.</div>'}`:''}</div>`}

function permissionsPanel(){if(!isAdminUnlocked())return '';return `<div class="item"><details><summary style="font-weight:900;cursor:pointer">🔐 Permisos por miembro</summary><div style="margin-top:12px"><p class="muted small">Solo el administrador principal puede cambiar estos permisos. El administrador principal conserva todos los permisos.</p>${state.members.map(m=>{let owner=isOwnerMember(m),perms=memberPerms(m);return `<div class="item"><div class="between wrap"><div>${avatarHtml(m,'avatar smallAvatar')} <b>${esc(m.name)}</b> ${owner?'<span class="roleBadge admin">👑 Admin principal</span>':'<span class="roleBadge">Miembro</span>'}</div>${!owner?`<button class="btn ghost" onclick="transferOwner('${m.id}')">Hacer admin principal</button>`:''}</div><div class="grid grid2" style="margin-top:10px">${ALL_PERMISSIONS.map(k=>`<label class="small"><input type="checkbox" style="width:auto;margin-right:8px" ${perms[k]?'checked':''} ${owner?'disabled':''} onchange="setMemberPermission('${m.id}','${k}',this.checked)"> ${PERMISSION_LABELS[k]}</label>`).join('')}</div></div>`}).join('')}</div></details></div>`}
function adminSettingsPanel(){let cur=currentMember();if(!cur)return `<div class="item"><h3>Administración 🔒</h3><p class="muted small">Elige primero quién eres en este dispositivo.</p></div>`;if(!hasAnyAdmin())return `<div class="item adminPanel"><h3>Crear administrador principal</h3><p class="small">Todavía no hay administrador principal. El miembro seleccionado en este móvil puede activar el rol y crear un PIN.</p><button class="btn" onclick="makeFirstAdmin()">Hacer administrador principal a ${esc(cur.name)}</button></div>`;if(!isOwnerMember(cur))return `<div class="item"><h3>Administración 🔒</h3><p class="muted small">Este dispositivo está configurado como <b>${esc(cur.name)}</b>. Puede tener permisos concretos, pero solo el administrador principal puede cambiarlos.</p></div>`;if(!state.adminUnlocked)return `<div class="item adminPanel"><h3>Administrador principal 🔒</h3><p class="small">Desbloquea con PIN para cambiar permisos, transferir administración y gestionar ajustes sensibles.</p><button class="btn" onclick="unlockAdmin()">Desbloquear con PIN</button></div>`;return `<div class="item adminPanel"><div class="between wrap"><h3>Administrador principal activo 👑</h3><button class="btn ghost" onclick="lockAdmin()">Bloquear</button></div><p class="small">Puedes cambiar permisos del resto de la familia y transferir la administración principal.</p><div class="row wrap"><button class="btn secondary" onclick="changeAdminPin()">Cambiar PIN</button><button class="btn ghost" onclick="openTab('tareas')">Crear tarea</button></div></div>${permissionsPanel()}`}

function renderIncidencias(){let open=state.incidents.filter(i=>i.status==='open'),progress=state.incidents.filter(i=>i.status==='in_progress'),solved=state.incidents.filter(i=>i.status==='solved');let active=open.concat(progress);$('#view-incidencias').innerHTML=`<div class="sectionHero"><div class="sectionHeroTop"><div><h2>Incidencias</h2><p class="muted small">Problemas de la casa, ordenados por estado.</p></div><span class="pill ${active.length?'bad':'ok'}">${active.length} activas</span></div><div class="sectionCounters"><div class="sectionCounter"><b>${open.length}</b><span>abiertas</span></div><div class="sectionCounter"><b>${progress.length}</b><span>en proceso</span></div><div class="sectionCounter"><b>${solved.length}</b><span>resueltas</span></div></div></div><div class="card"><details><summary style="font-weight:900;cursor:pointer">➕ Crear incidencia</summary><form onsubmit="addIncident(event)" class="grid" style="margin-top:12px"><div class="grid grid2"><select name="room_id">${roomOptions('sin-zona')}</select><select name="priority"><option value="low">Prioridad baja</option><option value="medium" selected>Prioridad media</option><option value="high">Prioridad alta</option><option value="urgent">Urgente</option></select></div><input name="title" placeholder="Ej. Grifo pierde agua" required><textarea name="description" placeholder="Describe qué pasa y dónde"></textarea><button class="btn">Crear incidencia</button></form></details></div><div class="card"><div class="between"><div><h2>Abiertas y en proceso</h2><div class="muted small">Lo que todavía requiere atención.</div></div><span class="pill ${active.length?'bad':'ok'}">${active.length}</span></div><div class="incidentList" style="margin-top:10px">${active.length?active.map(incidentCard).join(''):'<div class="empty">No hay incidencias abiertas.</div>'}</div></div><div class="card"><details><summary style="font-weight:900;cursor:pointer">✅ Solucionadas (${solved.length})</summary><div class="incidentList" style="margin-top:10px">${solved.length?solved.map(incidentCard).join(''):'<div class="empty">Todavía no hay incidencias solucionadas.</div>'}</div></details></div>`}
function renderAjustes(){
  let notif=localStorage.getItem('casaplan_notifications')==='1';
  let cur=currentMember();
  let syncLabel=state.error?'Con error':'Sincronizado';
  let photoLabel=state.photoError?'Modo local':'Nube activa';
  let roleLabel=cur?(isOwnerMember(cur)?'Admin principal':'Miembro'):'Sin elegir';
  $('#view-ajustes').innerHTML=`<div class="settingsPage">
    <div class="settingsHero">
      <div class="settingsHeroTop"><div><h2>Ajustes</h2><p class="muted small">Tu perfil, permisos y mantenimiento de CasaPlan.</p></div><span class="versionBadge">v67</span></div>
      <div class="settingsStatusGrid">
        <div class="settingsStatus"><span>Sincronización</span><b>${esc(syncLabel)}</b></div>
        <div class="settingsStatus"><span>Fotos</span><b>${esc(photoLabel)}</b></div>
        <div class="settingsStatus"><span>Perfil</span><b>${esc(roleLabel)}</b></div>
        <div class="settingsStatus"><span>Familia</span><b>${esc(CONFIG.FAMILY_CODE)}</b></div>
      </div>
      ${state.error?`<div class="error" style="margin-top:10px">${esc(state.error)}<br><br>Revisa las migraciones de Supabase y recarga la aplicación.</div>`:''}
      ${state.photoError?`<div class="error" style="margin-top:10px">${esc(state.photoError)}<br>Crea el bucket público task-photos y permite select/insert/delete para usuarios anon.</div>`:''}
    </div>

    <section class="settingsSection">
      <div class="settingsSectionHead"><div class="settingsSectionIcon">◉</div><div><h3>Perfil de este dispositivo</h3><p class="muted tiny">Define quién utiliza este móvil.</p></div></div>
      <div class="settingsProfileSelect"><select onchange="setCurrentMember(this.value)"><option value="" ${!state.currentMemberId?'selected':''}>Sin elegir</option>${state.members.map(m=>`<option value="${m.id}" ${state.currentMemberId===m.id?'selected':''}>${esc(m.name)} ${isOwnerMember(m)?'👑':''}</option>`).join('')}</select></div>
      ${cur?`<div class="settingsAvatarMini">${avatarHtml(cur)}<span class="small">Este móvil está configurado como <b>${esc(cur.name)}</b>.</span></div>`:''}
    </section>

    <section class="settingsSection">
      <div class="settingsSectionHead"><div class="settingsSectionIcon">♛</div><div><h3>Administración y permisos</h3><p class="muted tiny">Controles sensibles y edición de tareas.</p></div></div>
      ${adminSettingsPanel()}
    </section>

    <section class="settingsSection">
      <div class="settingsSectionHead"><div class="settingsSectionIcon">⌁</div><div><h3>Familia y acceso</h3><p class="muted tiny">Invita a otros dispositivos con el mismo código familiar.</p></div></div>
      <div class="settingsActions"><button class="btn secondary" onclick="navigator.clipboard?.writeText(location.href);alert('Enlace copiado')">Copiar enlace</button>${isAdminUnlocked()?`<button class="btn ghost" onclick="changeFamilyCode()">Cambiar código</button>`:''}</div>
    </section>

    <section class="settingsSection">
      <div class="settingsSectionHead"><div class="settingsSectionIcon">⌁</div><div><h3>Aplicación</h3><p class="muted tiny">Notificaciones y actualización.</p></div></div>
      <details><summary>Notificaciones</summary><div class="settingsDetailsBody"><p class="muted small">Activa avisos locales del navegador. En iPhone puede requerir instalar la web en la pantalla de inicio.</p><button class="btn ${notif?'ok':'secondary'} full" onclick="enableNotifications()">${notif?'Notificaciones activadas':'Activar notificaciones'}</button></div></details>
      <details><summary>Actualización de CasaPlan</summary><div class="settingsDetailsBody"><p class="muted small">Úsalo si un dispositivo sigue mostrando una versión antigua.</p><div class="settingsVersion"><span class="versionBadge">v67</span><button class="btn secondary" onclick="forceAppUpdate(this)">Forzar actualización</button></div></div></details>
    </section>

    ${isAdminUnlocked()?`<section class="settingsSection"><div class="settingsSectionHead"><div class="settingsSectionIcon">⚙</div><div><h3>Mantenimiento</h3><p class="muted tiny">Limpieza y copia de seguridad.</p></div></div><div class="settingsActions"><button class="btn ghost" onclick="cleanupDoneTasksPreviousMonth(true)">Limpiar mes anterior</button><button class="btn ghost" onclick="exportData()">Exportar copia JSON</button></div></section>`:''}
  </div>`
}
function render(){stats();const active=state.tab||'hoy';const map={hoy:renderHoy,calendario:renderCalendario,tareas:renderTareas,habitaciones:renderHabitaciones,familia:renderFamilia,incidencias:renderIncidencias,compra:renderCompra,ajustes:renderAjustes};const keepTaskForm=active==='tareas'&&(taskCreateFormHasFocus()||taskCreateFormDirty());if(!keepTaskForm){if(map[active])map[active]();else renderHoy()}if(!uiInteractionBusy())(window.requestIdleCallback||((fn)=>setTimeout(fn,120)))(()=>{if(uiInteractionBusy())return;Object.entries(map).forEach(([k,fn])=>{if(k!==active)try{fn()}catch(e){}})},{timeout:700})}
function openTab(tab){if(state.tab===tab&&document.querySelector('#view-'+tab+':not(.hidden)'))return;let current=document.querySelector('.view:not(.hidden)');if(current){current.classList.add('leaving');setTimeout(()=>{current.classList.add('hidden');current.classList.remove('leaving')},130)}state.tab=tab;$$('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));let target=$('#view-'+tab);setTimeout(()=>{target.classList.remove('hidden');target.style.animation='none';void target.offsetWidth;target.style.animation=''},current?130:0);const map={hoy:renderHoy,calendario:renderCalendario,tareas:renderTareas,habitaciones:renderHabitaciones,familia:renderFamilia,incidencias:renderIncidencias,compra:renderCompra,ajustes:renderAjustes};try{map[tab]?.()}catch(e){}scrollTo({top:0,behavior:'auto'})}
function bindQuickFilterButtons(){ $$('.heroBtn[data-quick-filter]').forEach(btn=>{btn.addEventListener('click',ev=>{ev.preventDefault();openQuickFilter(btn.dataset.quickFilter)})}) }
$$('.nav button').forEach(b=>b.onclick=()=>openTab(b.dataset.tab));bindQuickFilterButtons();init();
setInterval(()=>{if(localStorage.getItem('casaplan_notifications')==='1'&&Notification.permission==='granted'){let n=state.tasks.filter(t=>taskMatchesDate(t,today())&&t.status!=='done').length;if(n&&!sessionStorage.getItem('casaplan_notified_'+today())){new Notification('CasaPlan',{body:`Tienes ${n} tarea(s) pendiente(s) hoy.`});sessionStorage.setItem('casaplan_notified_'+today(),'1')} }},60000);
</script>
</body>
</html>
